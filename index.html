<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FX Multi-Pair Dashboard</title>
    <style>
        :root { --bg: #131722; --panel: #1e222d; --text: #d1d4dc; --blue: #2962ff; --cyan: #00bcd4; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { padding: 12px; background: var(--panel); border-bottom: 1px solid #363c4e; flex-shrink: 0; }
        .upload-row { display: flex; gap: 10px; align-items: center; }
        .file-label { background: var(--blue); color: white; padding: 8px 16px; border-radius: 4px; font-size: 13px; cursor: pointer; font-weight: bold; }
        input[type="file"] { display: none; }
        #status { font-size: 12px; color: var(--cyan); }
        #dashboard { flex-grow: 1; overflow-y: auto; padding: 15px; display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .chart-card { background: var(--panel); border-radius: 8px; border: 1px solid #333; height: 350px; display: flex; flex-direction: column; }
        .chart-header { padding: 10px 15px; background: rgba(255,255,255,0.05); font-weight: bold; font-size: 14px; color: var(--cyan); border-bottom: 1px solid #333; }
        .canvas-wrapper { flex-grow: 1; position: relative; min-height: 0; }
        canvas { width: 100%; height: 100%; }
        .controls { padding: 10px; display: flex; flex-direction: column; gap: 5px; border-top: 1px solid #333; font-size: 11px; }
        .sld-group { display: flex; align-items: center; gap: 10px; }
        .sld-group label { width: 40px; }
        input[type="range"] { flex-grow: 1; accent-color: var(--blue); }
    </style>
</head>
<body>

<header>
    <div class="upload-row">
        <label class="file-label">📂 CSV/Pivotを選択 (複数可)
            <input type="file" id="fileIn" multiple accept=".csv">
        </label>
        <span id="status">ファイルを読み込んでください</span>
    </div>
</header>

<div id="dashboard"></div>

<script>
    const dashboard = document.getElementById('dashboard');
    const statusEl = document.getElementById('status');
    const chartMap = new Map(); 
    const pairKeywords = ["USDJPY", "EURJPY", "GBPJPY", "EURUSD", "GBPUSD", "AUDUSD", "GOLD"];

    function writeLog(m) { statusEl.innerText = "> " + m; }

    function parseCSVDate(s) {
        if (!s) return null;
        try {
            const clean = s.trim().replace(/-/g, '/');
            const parts = clean.split(' ');
            const d = parts[0].split('/');
            let h = 0, m = 0;
            if (parts.length > 1) { 
                const t = parts[1].split(':'); 
                h = parseInt(t[0]); m = parseInt(t[1] || 0); 
            }
            const dt = new Date(parseInt(d[0]), parseInt(d[1]) - 1, parseInt(d[2]), h, m, 0);
            return isNaN(dt.getTime()) ? null : Math.floor(dt.getTime() / 1000);
        } catch(e) { return null; }
    }

    function parseCSV(text) {
        const lines = text.split(/\r?\n/).filter(l => l.includes(','));
        const res = [];
        for (let i = 1; i < lines.length; i++) {
            const c = lines[i].split(',');
            if (c.length < 3) continue;
            const t = parseCSVDate(c[0]);
            if (t === null) continue;
            res.push({ t, v: parseFloat(c[2]), p: c[3] ? parseFloat(c[3]) : NaN });
        }
        return res.sort((a, b) => a.t - b.t);
    }

    function parsePivotCSV(text) {
        const lines = text.split(/\r?\n/).filter(l => l.includes(','));
        const res = [];
        for (let i = 1; i < lines.length; i++) {
            const c = lines[i].split(',');
            if (c.length < 13) continue;
            const t = parseCSVDate(c[1]);
            if (t === null) continue;
            res.push({ t, levels: { PP: parseFloat(c[7]), R1: parseFloat(c[6]), S1: parseFloat(c[8]) } });
        }
        return res.sort((a, b) => a.t - b.t);
    }

    function getSMA(data, n, field) {
        return data.map((d, i) => {
            if (i < n - 1) return { t: d.t, v: NaN };
            let sum = 0, count = 0;
            for (let j = 0; j < n; j++) {
                const val = data[i - j] ? data[i - j][field] : null;
                if (val !== null && !isNaN(val)) { sum += val; count++; }
            }
            return { t: d.t, v: count === n ? sum / n : NaN };
        });
    }

    class FXChart {
        constructor(pair) {
            this.pair = pair;
            this.dataH1 = [];
            this.dataPivot = [];
            this.dataSMA = [];
            this.dataPriceSMA = [];
            this.zoom = 120;
            this.scroll = 100;
            this.initDOM();
        }

        initDOM() {
            const card = document.createElement('div');
            card.className = 'chart-card';
            card.innerHTML = `
                <div class="chart-header">${this.pair}</div>
                <div class="canvas-wrapper"><canvas></canvas></div>
                <div class="controls">
                    <div class="sld-group"><label>表示</label><input type="range" class="zoom-sld" min="24" max="500" value="120"></div>
                    <div class="sld-group"><label>位置</label><input type="range" class="scroll-sld" min="0" max="100" value="100"></div>
                </div>
            `;
            dashboard.appendChild(card);
            this.canvas = card.querySelector('canvas');
            this.ctx = this.canvas.getContext('2d');
            card.querySelector('.zoom-sld').oninput = (e) => { this.zoom = e.target.value; this.draw(); };
            card.querySelector('.scroll-sld').oninput = (e) => { this.scroll = e.target.value; this.draw(); };
            window.addEventListener('resize', () => this.draw());
        }

       draw() {
            const ctx = this.ctx;
            const rect = this.canvas.parentElement.getBoundingClientRect();
            this.canvas.width = rect.width * window.devicePixelRatio;
            this.canvas.height = rect.height * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
            const w = rect.width, h = rect.height;

            ctx.fillStyle = "#131722"; ctx.fillRect(0, 0, w, h);
            if (this.dataH1.length === 0) return;

            const pad = { top: 30, right: 50, bottom: 25, left: 10, gap: 20 };
            const totalPoints = this.dataH1.length;
            const viewRange = parseInt(this.zoom);
            const startIdx = Math.max(0, Math.floor((totalPoints - viewRange) * (parseInt(this.scroll) / 100)));
            const endIdx = Math.min(totalPoints - 1, startIdx + viewRange);

            const getX = (idx) => pad.left + (idx - startIdx) / (endIdx - startIdx) * (w - pad.left - pad.right);
            const splitY = h * 0.55; // 価格エリアを少し広めに (55%) 
            const pTop = pad.top, pBot = splitY - pad.gap/2, rTop = splitY + pad.gap/2, rBot = h - pad.bottom;

            let visible = this.dataH1.slice(startIdx, endIdx + 1);
            let pList = visible.map(d => d.p).filter(p => !isNaN(p));
            const pLo = pList.length > 0 ? Math.min(...pList) : 0;
            const pHi = pList.length > 0 ? Math.max(...pList) : 1;
            const pRange = pHi - pLo || 0.001;
            
            // 価格の上下に5%の余白を持たせて見やすくする
            const getYPrice = (p) => pBot - ((p - (pLo - pRange * 0.05)) / (pRange * 1.1)) * (pBot - pTop);
            
            // 比率側の計算
            let vList = visible.map(d => d.v).filter(v => !isNaN(v));
            const vLo = Math.min(...vList) - 1, vHi = Math.max(...vList) + 1, vR = vHi - vLo || 1;
            const getYRatio = (v) => rBot - ((v - vLo) / vR) * (rBot - rTop);

            // 1. グリッド線の描画 (視認性向上)
            ctx.strokeStyle = "#2b2b43"; ctx.lineWidth = 0.5;
            // 水平グリッド
            [pTop, (pTop+pBot)/2, pBot, rTop, (rTop+rBot)/2, rBot].forEach(y => {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
            });

            // 2. Pivot (PP) を目立たせる
            if (this.dataPivot.length > 0) {
                ctx.setLineDash([2, 2]);
                ctx.strokeStyle = "rgba(255, 255, 255, 0.4)";
                for (let i = startIdx; i <= endIdx; i++) {
                    const curT = this.dataH1[i].t;
                    const pvt = this.dataPivot.find(p => p.t <= curT && p.t + 86400 > curT);
                    if (pvt) {
                        const x = getX(i), yPP = getYPrice(pvt.levels.PP);
                        ctx.beginPath(); ctx.moveTo(x, yPP); ctx.lineTo(x + (w/viewRange), yPP); ctx.stroke();
                    }
                }
                ctx.setLineDash([]);
            }

            const drawLine = (dataArr, field, color, weight, yFunc, dash = []) => {
                if (!dataArr || dataArr.length === 0) return;
                ctx.strokeStyle = color; ctx.lineWidth = weight; ctx.setLineDash(dash);
                ctx.beginPath();
                let first = true;
                for (let i = startIdx; i <= endIdx; i++) {
                    const item = dataArr[i];
                    if (!item || isNaN(item[field])) continue;
                    const x = getX(i), y = yFunc(item[field]);
                    if (first) { ctx.moveTo(x, y); first = false; } else { ctx.lineTo(x, y); }
                }
                ctx.stroke(); ctx.setLineDash([]);
            };

            // 3. 価格ライン（少し太く、発光感を出す）
            drawLine(this.dataH1, 'p', "rgba(255, 255, 255, 0.5)", 1.5, getYPrice); // 白い価格線
            drawLine(this.dataPriceSMA, 'v', "#00bcd4", 2.5, getYPrice);        // 水色の太いSMA [cite: 143]

            // 4. 比率ライン
            drawLine(this.dataH1, 'v', "#ff9800", 1, getYRatio);               // オレンジの比率線 [cite: 142]
            drawLine(this.dataSMA, 'v', "#4caf50", 1.5, getYRatio, [4, 4]);    // 緑の破線SMA [cite: 142]

            // 5. 右端に現在値を表示
            const lastData = this.dataH1[endIdx];
            if (lastData && !isNaN(lastData.p)) {
                ctx.fillStyle = "#fff"; ctx.font = "bold 10px sans-serif";
                ctx.fillText(lastData.p.toFixed(this.pair.includes("JPY") ? 3 : 5), w - 45, getYPrice(lastData.p) + 4);
            }
        }
            }
        }
    }

    document.getElementById('fileIn').addEventListener('change', async (e) => {
        const files = Array.from(e.target.files);
        for (const file of files) {
            const text = await file.text();
            const fName = file.name.toUpperCase();
            const pair = pairKeywords.find(k => fName.includes(k));
            if (!pair) continue;

            let chart = chartMap.get(pair);
            if (!chart) { chart = new FXChart(pair); chartMap.set(pair, chart); }

            if (fName.includes("PIVOT")) {
                chart.dataPivot = parsePivotCSV(text);
                writeLog(pair + " Pivot 完了");
            } else {
                chart.dataH1 = parseCSV(text);
                // ここでSMAを計算して保持させる
                chart.dataSMA = getSMA(chart.dataH1, 10, 'v');
                chart.dataPriceSMA = getSMA(chart.dataH1, 10, 'p');
                writeLog(pair + " H1 完了");
            }
            chart.draw();
        }
    });
</script>
</body>
</html>
