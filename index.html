<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FX Dashboard v1.1.5</title>
    <style>
        :root { --bg: #131722; --panel: #1e222d; --text: #d1d4dc; --blue: #2962ff; --cyan: #00bcd4; --orange: #ff9800; --green: #4caf50; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; height: 100dvh; overflow: hidden; }
        header { padding: 10px; background: var(--panel); border-bottom: 1px solid #363c4e; flex-shrink: 0; display: flex; justify-content: space-between; align-items: center; }
        .version { font-size: 10px; color: #5d606b; margin-left: 10px; }
        .upload-row { display: flex; gap: 10px; align-items: center; }
        .file-label { background: var(--blue); color: white; padding: 8px 15px; border-radius: 4px; font-size: 13px; cursor: pointer; font-weight: bold; }
        input[type="file"] { display: none; }
        #status { font-size: 11px; color: var(--cyan); }
        #dashboard { flex-grow: 1; overflow-y: auto; padding: 10px; display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 15px; }
        .chart-card { background: var(--panel); border-radius: 8px; border: 1px solid #333; height: 400px; display: flex; flex-direction: column; overflow: hidden; }
        .chart-header { padding: 8px 12px; background: rgba(255,255,255,0.05); font-size: 12px; display: flex; justify-content: space-between; border-bottom: 1px solid #333; flex-shrink: 0; }
        .info-display { color: #fff; font-family: monospace; }
        .canvas-wrapper { flex-grow: 1; position: relative; cursor: crosshair; touch-action: none; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        /* スライダー操作性の改善 */
        .controls { padding: 10px; border-top: 1px solid #333; flex-shrink: 0; background: var(--panel); z-index: 20; }
        .sld-group { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .sld-group label { font-size: 11px; width: 40px; font-weight: bold; }
        input[type="range"] { 
            flex-grow: 1; 
            height: 36px; /* 触りやすく高くする */
            accent-color: var(--blue); 
            touch-action: pan-x; /* タッチ操作を有効化 */
        }
    </style>
</head>
<body>

<header>
    <div class="upload-row">
        <label class="file-label">📂 CSVを選択
            <input type="file" id="fileIn" multiple accept=".csv, text/csv">
        </label>
        <span id="status">ファイルを読み込んでください</span>
    </div>
    <div class="version">v1.1.5</div>
</header>

<div id="dashboard"></div>

<script>
    const dashboard = document.getElementById('dashboard');
    const statusEl = document.getElementById('status');
    const chartMap = new Map(); 
    const pairKeywords = ["USDJPY", "EURJPY", "GBPJPY", "EURUSD", "GBPUSD", "AUDUSD", "GOLD"];

    function parseCSV(text) {
        const lines = text.split(/\r?\n/).filter(l => l.includes(','));
        const res = [];
        for (let i = 1; i < lines.length; i++) {
            const c = lines[i].split(',');
            if (c.length < 3) continue;
            const clean = c[0].trim().replace(/-/g, '/');
            const dt = new Date(clean);
            if (isNaN(dt)) continue;
            res.push({ t: Math.floor(dt.getTime()/1000), v: parseFloat(c[2]), p: c[3] ? parseFloat(c[3]) : NaN });
        }
        return res.sort((a, b) => a.t - b.t);
    }

    // Pivot計算の精密化
    function calcAutoPivot7(data) {
        const pivots = [];
        const days = {};
        data.forEach(d => {
            const dateStr = new Date(d.t * 1000).toLocaleDateString('ja-JP');
            if(!days[dateStr]) days[dateStr] = [];
            days[dateStr].push(d);
        });
        const dates = Object.keys(days).sort();
        for(let i=1; i<dates.length; i++) {
            const prevDay = days[dates[i-1]];
            const prices = prevDay.map(d => d.p).filter(p => !isNaN(p));
            if(prices.length === 0) continue;
            const H = Math.max(...prices), L = Math.min(...prices), C = prices[prices.length-1];
            const P = (H + L + C) / 3;
            pivots.push({ 
                t: days[dates[i]][0].t, // 当日の開始時間
                endT: days[dates[i]][days[dates[i]].length-1].t, // 当日の終了時間
                levels: { 
                    P, R1: (2*P)-L, R2: P+H-L, R3: ((2*P)-L)+H-L,
                    S1: (2*P)-H, S2: P-H+L, S3: ((2*P)-H)-H+L
                } 
            });
        }
        return pivots;
    }

    function getSMA(d, n, f) {
        return d.map((_, i) => {
            if (i < n - 1) return { t: d[i].t, v: NaN };
            let sum = 0, count = 0;
            for (let j = 0; j < n; j++) {
                if (d[i-j] && !isNaN(d[i-j][f])) { sum += d[i-j][f]; count++; }
            }
            return { t: d[i].t, v: count === n ? sum / n : NaN };
        });
    }

    class FXChart {
        constructor(pair) {
            this.pair = pair;
            this.dataH1 = []; this.dataSMA = []; this.dataPriceSMA = [];
            this.dataPvt = []; this.dataShiftedTrend = [];
            this.zoom = 120; this.scroll = 100; this.mouseX = -1;
            this.initDOM();
        }

        initDOM() {
            const card = document.createElement('div');
            card.className = 'chart-card';
            card.innerHTML = `
                <div class="chart-header"><span style="color:var(--cyan);font-weight:bold">${this.pair}</span><span class="info-display">-</span></div>
                <div class="canvas-wrapper"><canvas></canvas></div>
                <div class="controls">
                    <div class="sld-group"><label>範囲</label><input type="range" class="zoom-sld" min="24" max="500" value="120"></div>
                    <div class="sld-group"><label>位置</label><input type="range" class="scroll-sld" min="0" max="100" value="100"></div>
                </div>
            `;
            dashboard.appendChild(card);
            this.canvas = card.querySelector('canvas');
            this.ctx = this.canvas.getContext('2d');
            this.info = card.querySelector('.info-display');
            
            card.querySelector('.zoom-sld').oninput = (e) => { this.zoom = parseInt(e.target.value); this.draw(); };
            card.querySelector('.scroll-sld').oninput = (e) => { this.scroll = parseInt(e.target.value); this.draw(); };
            
            const handleMove = (e) => {
                const rect = this.canvas.getBoundingClientRect();
                const clientX = e.clientX || (e.touches && e.touches[0] ? e.touches[0].clientX : -1);
                if(clientX === -1) return;
                this.mouseX = clientX - rect.left;
                this.draw();
            };
            this.canvas.addEventListener('mousemove', handleMove);
            this.canvas.addEventListener('touchstart', handleMove, {passive: true});
            this.canvas.addEventListener('touchmove', handleMove, {passive: true});
            window.addEventListener('resize', () => this.draw());
        }

        draw() {
            const ctx = this.ctx;
            const w = this.canvas.clientWidth, h = this.canvas.clientHeight;
            const dpr = window.devicePixelRatio || 1;
            if (this.canvas.width !== Math.floor(w * dpr)) {
                this.canvas.width = w * dpr; this.canvas.height = h * dpr;
            }
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.scale(dpr, dpr);

            ctx.fillStyle = "#131722"; ctx.fillRect(0, 0, w, h);
            if (this.dataH1.length === 0) return;

            const total = this.dataH1.length;
            const viewCount = Math.min(this.zoom, total);
            const startIdx = Math.max(0, Math.floor((total - viewCount) * (this.scroll / 100)));
            const endIdx = Math.min(total - 1, startIdx + viewCount);

            const getX = (idx) => 10 + (idx - startIdx) / (viewCount) * (w - 75);
            const splitY = h * 0.55, pBot = splitY - 10, rTop = splitY + 10, rBot = h - 20;

            const visible = this.dataH1.slice(startIdx, endIdx + 1);
            const pL = visible.map(d => d.p).filter(p => !isNaN(p));
            const pLo = Math.min(...pL), pHi = Math.max(...pL), pR = (pHi - pLo || 0.01) * 1.3;
            const getYp = (p) => pBot - ((p - (pLo - pR*0.1)) / pR) * (pBot - 20);

            const vL = visible.map(d => d.v).filter(v => !isNaN(v));
            const vLo = Math.min(...vL) - 1, vHi = Math.max(...vL) + 1, vR = vHi - vLo || 1;
            const getYr = (v) => rBot - ((v - vLo) / vR) * (rBot - rTop);

            ctx.strokeStyle = "#2b2b43"; ctx.lineWidth = 0.5;
            ctx.beginPath(); ctx.moveTo(0,splitY); ctx.lineTo(w,splitY); ctx.stroke();

            const drawL = (arr, f, col, lw, yf, dash=[], isTrend=false) => {
                ctx.strokeStyle = col; ctx.lineWidth = lw; ctx.setLineDash(dash);
                ctx.beginPath(); let first = true;
                for(let i = startIdx; i <= endIdx; i++) {
                    const targetT = this.dataH1[i].t;
                    const item = isTrend ? arr.find(d => d.t === targetT) : arr[i];
                    if(!item || isNaN(item[f])) continue;
                    const x = getX(i), y = yf(item[f]);
                    if(first){ ctx.moveTo(x,y); first=false; } else ctx.lineTo(x,y);
                }
                ctx.stroke(); ctx.setLineDash([]);
            };

            drawL(this.dataPriceSMA, 'v', "rgba(0,188,212,0.5)", 3, getYp);
            drawL(this.dataH1, 'p', "#fff", 1, getYp);
            drawL(this.dataH1, 'v', "#ff9800", 1, getYr);
            drawL(this.dataSMA, 'v', "#4caf50", 1.5, getYr, [4,4]);
            drawL(this.dataShiftedTrend, 'v', "#2962ff", 3, getYr, [], true);

            // Pivot描画の修正（インデックスベースで範囲を特定）
            this.dataPvt.forEach(p => {
                const sIdx = this.dataH1.findIndex(d => d.t >= p.t);
                const eIdx = this.dataH1.findIndex(d => d.t >= p.endT);
                
                if (sIdx !== -1 && sIdx <= endIdx && (eIdx === -1 || eIdx >= startIdx)) {
                    const drawXStart = getX(Math.max(startIdx, sIdx));
                    const drawXEnd = getX(eIdx === -1 ? endIdx + 1 : Math.min(endIdx + 1, eIdx + 1));
                    
                    Object.entries(p.levels).forEach(([k, val]) => {
                        const y = getYp(val);
                        ctx.strokeStyle = k === 'P' ? "rgba(255,255,255,0.6)" : 
                                         k.startsWith('R') ? "rgba(255,100,100,0.3)" : "rgba(100,100,255,0.3)";
                        ctx.setLineDash([2, 2]); ctx.beginPath();
                        ctx.moveTo(drawXStart, y); ctx.lineTo(drawXEnd, y); ctx.stroke();
                    });
                }
            });

            if(this.mouseX > 0) {
                const relX = (this.mouseX - 10) / (w - 75);
                const hoverIdx = Math.round(startIdx + relX * viewCount);
                const d = this.dataH1[Math.max(0, Math.min(total-1, hoverIdx))];
                if(d) {
                    ctx.strokeStyle = "rgba(255,255,255,0.4)";
                    ctx.beginPath(); ctx.moveTo(getX(hoverIdx), 0); ctx.lineTo(getX(hoverIdx), h); ctx.stroke();
                    this.info.innerText = `${new Date(d.t*1000).toLocaleString('ja-JP')} P:${d.p.toFixed(3)}`;
                }
            }
        }
    }

    document.getElementById('fileIn').onchange = async (e) => {
        for (const file of e.target.files) {
            const text = await file.text();
            const pair = pairKeywords.find(k => file.name.toUpperCase().includes(k));
            if (!pair) continue;
            let chart = chartMap.get(pair);
            if (!chart) { chart = new FXChart(pair); chartMap.set(pair, chart); }
            
            chart.dataH1 = parseCSV(text);
            const lastActual = chart.dataH1[chart.dataH1.length - 1];
            const next0 = new Date(lastActual.t * 1000);
            next0.setHours(24, 0, 0, 0);
            chart.dataH1.push({ t: Math.floor(next0.getTime() / 1000), v: NaN, p: NaN });

            chart.dataSMA = getSMA(chart.dataH1, 10, 'v');
            chart.dataPriceSMA = getSMA(chart.dataH1, 10, 'p');
            chart.dataPvt = calcAutoPivot7(chart.dataH1);
            
            chart.dataShiftedTrend = [];
            const indices23 = [];
            chart.dataH1.forEach((d, idx) => { if (new Date(d.t * 1000).getHours() === 23) indices23.push(idx); });
            for (let i = 0; i < indices23.length; i++) {
                if (i > 0) chart.dataShiftedTrend.push({ t: chart.dataH1[indices23[i]].t, v: chart.dataH1[indices23[i-1]].v });
            }
            if (indices23.length > 0) {
                chart.dataShiftedTrend.push({ t: chart.dataH1[chart.dataH1.length - 1].t, v: chart.dataH1[indices23[indices23.length - 1]].v });
            }

            chart.draw();
            statusEl.innerText = `${pair} 完了`;
        }
    };
</script>
</body>
</html>
