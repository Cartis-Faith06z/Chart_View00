<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>USDJPY NY Sniper Dashboard v1.3.1</title>
<style>
:root { --bg: #131722; --panel: #1e222d; --text: #d1d4dc; --blue: #2962ff; --cyan: #00bcd4; --red: #f44336; --yellow: #ffeb3b; --green: #4caf50; --orange: #ff9800; --pink: #ff4081; }
* { box-sizing: border-box; }
body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; display: flex; flex-direction: column; height: 100vh; height: 100dvh; overflow: hidden; }
        header { padding: 8px 12px; background: var(--panel); border-bottom: 1px solid #363c4e; flex-shrink: 0; display: flex; flex-direction: column; gap: 8px; }
.row { display: flex; gap: 10px; align-items: center; justify-content: space-between; }
        .file-label { background: var(--blue); color: white; padding: 10px 16px; border-radius: 4px; font-size: 13px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .file-label:hover { background: #1e4eb8; }
input[type="file"] { display: none; }
        
        #dashboard { flex-grow: 1; padding: 12px; display: flex; flex-direction: column; overflow: hidden; }
        .chart-card { background: var(--panel); border: 1px solid #363c4e; border-radius: 6px; display: flex; flex-direction: column; flex-grow: 1; overflow: hidden; }
        .chart-header { padding: 8px 12px; border-bottom: 1px solid #363c4e; display: flex; justify-content: space-between; align-items: center; font-size: 14px; flex-shrink: 0; background: #232836; }
        .info-display { font-family: monospace; font-size: 13px; white-space: nowrap; overflow: hidden; }
        .canvas-wrapper { flex-grow: 1; position: relative; min-height: 0; cursor: crosshair; }
canvas { display: block; width: 100%; height: 100%; touch-action: none; }
        .controls { padding: 8px 16px; border-top: 1px solid #363c4e; display: flex; flex-shrink: 0; background: #1a1e28; align-items: center; gap: 10px;}
        .zoom-sld { flex-grow: 1; accent-color: var(--cyan); cursor: pointer; }
</style>
</head>
<body>
<header>
<div class="row">
        <div style="display:flex; gap:15px; align-items:center;">
            <label class="file-label">CSVデータ読込<input type="file" id="fileIn" multiple accept=".csv"></label>
            <span id="status" style="font-size:12px;color:#888;">USDJPYのデータをお待ちしています...</span>
</div>
        <div style="text-align: right;">
            <div style="font-size:16px; font-weight:bold; color:var(--cyan);">USDJPY NY Sniper System</div>
            <div style="font-size:10px; color:#555;">Version 1.3.1</div>
        </div>
</div>
    <textarea id="pivot-input" placeholder="ここにPivotデータをペースト (任意)"></textarea>
</header>
<div id="dashboard"></div>

<script>
    const CONFIG = { 'USDJPY': { th: 0.5 } };
const dashboard = document.getElementById('dashboard');
const statusEl = document.getElementById('status');
const pivotInput = document.getElementById('pivot-input');
    let masterChart = null;

const parseDate = (dStr) => {
if (!dStr) return null;
        let d = new Date(dStr.replace(' ', 'T') + 'Z');
        if (isNaN(d.getTime())) return null;
        return d.getTime() / 1000;
};

const syncScale = (val, basePrice) => {
if (!val || !basePrice) return val;
        return basePrice + ((val - basePrice) * 0.1);
};

class FXChart {
constructor(pair) {
this.pair = pair; this.dataH1 = []; this.dataSMA = []; this.dataPriceSMA = []; this.dataShiftedTrend = [];
this.dataSMA10 = []; this.dataSMA20 = []; this.dataSMA75 = [];
this.rawPivot = null; this.zoom = 120; this.mouseX = -1; 
            this.signals = []; 
            this.poSignals = []; 
            this.viewOffset = 0; 
this.initDOM();
}

initDOM() {
const card = document.createElement('div');
card.className = 'chart-card';
            card.innerHTML = `
                <div class="chart-header">
                    <span style="color:var(--cyan);font-weight:bold;font-size:16px;">${this.pair}</span>
                    <span class="info-display">-</span>
                </div>
                <div class="canvas-wrapper"><canvas></canvas></div>
                <div class="controls">
                    <select class="sig-mode" style="background:#363c4e;color:#fff;border:none;padding:4px 8px;border-radius:4px;font-size:12px;margin-right:10px;cursor:pointer;">
                        <option value="ny">NY Sniperサイン</option>
                        <option value="po">PO発生サイン</option>
                    </select>
                    <div style="display:flex; gap:10px; font-size:11px; align-items:center; color:#ccc;">
                        <span style="color:var(--yellow)">■ Ratio 10SMA</span>
                        <span style="color:var(--pink)">■ Ratio 20SMA</span>
                        <span style="color:var(--orange)">■ Ratio 75SMA</span>
                    </div>
                    <span style="font-size:12px;color:#888;margin-left:auto;">Zoom:</span>
                    <input type="range" class="zoom-sld" min="24" max="1000" value="120">
                    <button id="resetBtn" style="background:#363c4e;color:#fff;border:none;padding:4px 8px;border-radius:4px;cursor:pointer;font-size:12px;">最新へ</button>
                </div>`;
dashboard.appendChild(card);
            
            this.canvas = card.querySelector('canvas'); 
            this.ctx = this.canvas.getContext('2d'); 
            this.info = card.querySelector('.info-display');
            
            // モード切り替え
            this.sigModeSelect = card.querySelector('.sig-mode');
            this.sigModeSelect.onchange = () => this.draw();

            // ズーム操作
card.querySelector('.zoom-sld').oninput = (e) => { this.zoom = parseInt(e.target.value); this.draw(); };
            
            // 最新位置へリセット
            card.querySelector('#resetBtn').onclick = () => { this.viewOffset = 0; this.draw(); };

            // ドラッグ操作
            let isDragging = false;
            let startX = 0;
            let startOffset = 0;

            const updateMouseX = (clientX) => {
const rect = this.canvas.getBoundingClientRect();
                this.mouseX = clientX - rect.left;
};

            this.canvas.addEventListener('mousedown', (e) => {
                isDragging = true;
                startX = e.clientX;
                startOffset = this.viewOffset;
                this.canvas.style.cursor = 'grabbing';
            });

            window.addEventListener('mouseup', () => { 
                isDragging = false; 
                this.canvas.style.cursor = 'crosshair';
            });

            this.canvas.addEventListener('mousemove', (e) => {
                updateMouseX(e.clientX);
                if (isDragging) {
                    const dx = e.clientX - startX;
                    const pxPerCandle = (this.canvas.clientWidth - 75) / this.zoom;
                    const shiftCandles = Math.round(dx / pxPerCandle);
                    this.viewOffset = startOffset + shiftCandles;
                }
                this.draw();
            });

            this.canvas.addEventListener('touchstart', (e) => {
                if(e.touches.length === 1) {
                    isDragging = true;
                    startX = e.touches[0].clientX;
                    startOffset = this.viewOffset;
                }
            }, {passive:true});
            this.canvas.addEventListener('touchmove', (e) => {
                if(e.touches.length === 1) {
                    updateMouseX(e.touches[0].clientX);
                    if (isDragging) {
                        const dx = e.touches[0].clientX - startX;
                        const pxPerCandle = (this.canvas.clientWidth - 75) / this.zoom;
                        this.viewOffset = startOffset + Math.round(dx / pxPerCandle);
                    }
                    this.draw();
                }
            }, {passive:true});
            this.canvas.addEventListener('touchend', () => isDragging = false);
}

update(h1, rawPvt) {
if(h1) {
this.dataH1 = h1;
                // SMA計算
const sma = (d, n, f) => d.map((_, i) => (i < n - 1) ? { t: d[i].t, v: NaN } : { t: d[i].t, v: d.slice(i-n+1, i+1).reduce((acc, curr) => acc + curr[f], 0) / n });
                this.dataPriceSMA = sma(this.dataH1, 10, 'p');
                this.dataSMA10 = sma(this.dataH1, 10, 'v'); 
                this.dataSMA20 = sma(this.dataH1, 20, 'v'); 
                this.dataSMA75 = sma(this.dataH1, 75, 'v'); 
                
                this.dataShiftedTrend = []; let base = NaN;
                this.dataH1.forEach(d => { if (new Date(d.t * 1000).getUTCHours() === 23) base = d.v; this.dataShiftedTrend.push({ t: d.t, v: base }); });

                // ===== 1. NYスナイパー トレードロジック =====
this.signals = [];
                const timeOffset = 7; 
                const getJST = (ts) => (new Date(ts * 1000).getUTCHours() + timeOffset) % 24;

                const findH = (targetJST, startIndex, maxLookback = 24) => {
                    for(let j = startIndex; j >= Math.max(0, startIndex - maxLookback); j--) {
                        if(getJST(this.dataH1[j].t) === targetJST) return this.dataH1[j];
                    }
                    return null;
                };

                for(let i = 0; i < this.dataH1.length; i++) {
                    let d = this.dataH1[i];
                    let h = getJST(d.t);

                    // 夏時間(21時) または 冬時間(22時) に限定
                    if (h === 21 || h === 22) {
                        let dEval = findH((h + 24 - 1) % 24, i, 3);       
                        let dStartRange = findH((h + 24 - 3) % 24, i, 5); 
                        let dTrendStart = findH(9, i, 16);                

                        if (dEval && dStartRange && dTrendStart) {
                            let trendMoveRaw = dStartRange.p - dTrendStart.p;
                            let rangeMoveRaw = dEval.p - dStartRange.p;
                            let ratioMove = dEval.v - dStartRange.v;

                            let rangeMove = Math.abs(rangeMoveRaw);

                            if (rangeMove <= 0.15 && Math.abs(ratioMove) >= 0.6) {
                                let isLong = ratioMove <= -0.6;
                                this.signals.push({
                                    idx: i,
                                    type: isLong ? 'LONG' : 'SHORT',
                                    price: d.p,
                                    rat: { trend: trendMoveRaw, range: rangeMoveRaw, ratio: ratioMove }
                                });
                            }
                        }
                    }
                }

                // ===== 2. PO（パーフェクトオーダー）発生ロジック =====
                this.poSignals = [];
                for(let i = 1; i < this.dataH1.length; i++) {
                    let prev = this.dataH1[i-1];
                    let curr = this.dataH1[i];
                    let h = getJST(curr.t);

                    // NYオープンの時間帯（21時・22時）のみPO発生サインを許可
                    if (h === 21 || h === 22) {
                        let pS10 = this.dataSMA10[i-1]?.v, pS20 = this.dataSMA20[i-1]?.v;
                        let cS10 = this.dataSMA10[i]?.v,   cS20 = this.dataSMA20[i]?.v;

                        if(pS10 !== undefined && pS20 !== undefined && cS10 !== undefined && cS20 !== undefined) {
                            // 前回(1時間前)のPO状態
                            let pPO_S = (prev.v > pS10) && (pS10 > pS20);
                            let pPO_L = (pS20 > pS10) && (pS10 > prev.v);
                            
                            // 今回(現在)のPO状態
                            let cPO_S = (curr.v > cS10) && (cS10 > cS20); // ショート: 青 > 黄 > 赤(ピンク)
                            let cPO_L = (cS20 > cS10) && (cS10 > curr.v); // ロング: 赤(ピンク) > 黄 > 青

                            // 新たにPOが形成された瞬間を検知
                            if(cPO_S && !pPO_S) {
                                this.poSignals.push({ idx: i, type: 'SHORT', price: curr.p });
                            }
                            if(cPO_L && !pPO_L) {
                                this.poSignals.push({ idx: i, type: 'LONG', price: curr.p });
                            }
                        }
                    }
                }
}
if(rawPvt) this.rawPivot = rawPvt;
            this.viewOffset = 0; 
this.draw();
}

draw() {
const ctx = this.ctx; const w = this.canvas.clientWidth, h = this.canvas.clientHeight;
if (w === 0 || h === 0) return;
const dpr = window.devicePixelRatio || 1; this.canvas.width = w * dpr; this.canvas.height = h * dpr;
ctx.scale(dpr, dpr); ctx.fillStyle = "#131722"; ctx.fillRect(0, 0, w, h);
if (this.dataH1.length === 0) return;

const viewCount = Math.min(this.zoom, this.dataH1.length);
            const maxOffset = Math.max(0, this.dataH1.length - viewCount);
            this.viewOffset = Math.max(0, Math.min(this.viewOffset, maxOffset));
            const startIdx = this.dataH1.length - viewCount - this.viewOffset;
            
const getX = (i) => 10 + (i - startIdx) / viewCount * (w - 75);
const splitY = h * 0.5;

            const visible = this.dataH1.slice(startIdx, startIdx + viewCount);
            if (visible.length === 0) return;

const pL = visible.map(d => d.p).filter(p => !isNaN(p));
const basePrice = pL[pL.length-1];
const pLo = Math.min(...pL), pHi = Math.max(...pL), pR = (pHi - pLo || 0.01) * 1.3;
const getYp = (p) => (splitY - 20) - ((p - (pLo - pR*0.1)) / pR) * (splitY - 40);

const vL = visible.map(d => d.v).filter(v => !isNaN(v));
const vLo = Math.min(...vL) - 2, vHi = Math.max(...vL) + 2, vR = vHi - vLo || 1;
const getYr = (v) => (h - 20) - ((v - vLo) / vR) * (h - splitY - 30);

const drawPath = (data, field, col, wd, yf, dash = []) => {
ctx.strokeStyle = col; ctx.lineWidth = wd; ctx.setLineDash(dash); ctx.beginPath(); let f = true;
                for(let i = startIdx; i < startIdx + viewCount; i++){
const val = data[i]?.[field]; if(isNaN(val)) continue;
const x = getX(i), y = yf(val); if(f) { ctx.moveTo(x,y); f=false; } else ctx.lineTo(x,y);
}
ctx.stroke(); ctx.setLineDash([]);
};

            // 下段：比率インジケーター描画
            drawPath(this.dataH1, 'v', "#2962ff", 2, getYr); // 比率 (青)
            drawPath(this.dataSMA10, 'v', "#ffeb3b", 1.5, getYr, [4, 2]); // 10SMA (黄色)
            drawPath(this.dataSMA20, 'v', "#ff4081", 1.5, getYr); // 20SMA (ピンク色) 
            drawPath(this.dataSMA75, 'v', "#ff9800", 1.5, getYr); // 75SMA (オレンジ) 
            drawPath(this.dataShiftedTrend, 'v', "#ffffff", 2, getYr); // 基準線 (白)

            // 上段：価格インジケーター描画
            drawPath(this.dataH1, 'p', "#fff", 2, getYp);
            drawPath(this.dataPriceSMA, 'v', "#ffeb3b", 1.5, getYp, [3, 3]);

            // ===== 矢印の描画関数 =====
            const drawArrow = (x, y, dir, color) => {
                ctx.fillStyle = color;
                ctx.beginPath();
                if (dir === 'UP') {
                    ctx.moveTo(x, y); 
                    ctx.lineTo(x - 5, y + 8); ctx.lineTo(x - 2, y + 8);
                    ctx.lineTo(x - 2, y + 16); ctx.lineTo(x + 2, y + 16);
                    ctx.lineTo(x + 2, y + 8); ctx.lineTo(x + 5, y + 8);
                } else {
                    ctx.moveTo(x, y); 
                    ctx.lineTo(x - 5, y - 8); ctx.lineTo(x - 2, y - 8);
                    ctx.lineTo(x - 2, y - 16); ctx.lineTo(x + 2, y - 16);
                    ctx.lineTo(x + 2, y - 8); ctx.lineTo(x + 5, y - 8);
                }
                ctx.closePath(); ctx.fill();
            }

            // サインの描画 (モード判定)
            const activeMode = this.sigModeSelect ? this.sigModeSelect.value : 'ny';
            const targetSignals = activeMode === 'po' ? this.poSignals : this.signals;

            targetSignals.forEach(sig => {
                if (sig.idx >= startIdx && sig.idx < startIdx + viewCount) {
                    const x = getX(sig.idx);
                    const isLong = sig.type === 'LONG';
                    const yBase = getYp(this.dataH1[sig.idx].p);
                    const y = isLong ? yBase + 15 : yBase - 15;
                    drawArrow(x, y, isLong ? 'UP' : 'DOWN', isLong ? '#00bcd4' : '#f44336');
                }
            });

            // Pivot描画
            if(this.rawPivot) {
                Object.entries(this.rawPivot).forEach(([k, val]) => {
                    const syncedVal = syncScale(val, basePrice);
                    const y = getYp(syncedVal);
                    ctx.strokeStyle = k==='P'?"rgba(255,255,255,0.4)":"rgba(255,255,255,0.15)";
                    ctx.setLineDash([2,2]); ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w-70, y); ctx.stroke();
                    ctx.fillStyle = ctx.strokeStyle; ctx.font = "10px Arial"; ctx.fillText(k, w-65, y+4);
                });
            }

            // ===== マウスオーバー表示 =====
            if(this.mouseX > 0) {
                const idx = Math.round(startIdx + (this.mouseX - 10) / (w - 75) * viewCount);
                const d = this.dataH1[Math.max(0, Math.min(this.dataH1.length-1, idx))];
                
                if(d) {
                    const dt = new Date(d.t * 1000);
                    const timeOffset = 7; 
                    const jstH = (dt.getUTCHours() + timeOffset) % 24;
                    const hStr = jstH.toString().padStart(2, '0');
                    
                    ctx.strokeStyle = "rgba(255,255,255,0.1)"; ctx.setLineDash([2,2]);
                    ctx.beginPath(); ctx.moveTo(getX(idx), 0); ctx.lineTo(getX(idx), h); ctx.stroke();

                    let infoHtml = `<span style="color:var(--cyan)">${dt.getUTCMonth()+1}/${dt.getUTCDate()} ${hStr}:00 (JST)</span> &nbsp;&nbsp; 価格: <span style="color:#fff">${d.p.toFixed(3)}</span> &nbsp;&nbsp; 買い比率: <span style="color:#2962ff">${d.v.toFixed(1)}%</span>`;
                    
                    const sig = targetSignals.find(s => s.idx === idx);
                    if(sig) {
                        const col = sig.type === 'LONG' ? '#00bcd4' : '#f44336';
                        if (activeMode === 'ny') {
                            const tMove = sig.rat.trend > 0 ? '+'+sig.rat.trend.toFixed(2) : sig.rat.trend.toFixed(2);
                            const rMove = sig.rat.ratio > 0 ? '+'+sig.rat.ratio.toFixed(2) : sig.rat.ratio.toFixed(2);
                            infoHtml += ` &nbsp;|&nbsp; <span style="color:${col};font-weight:bold;">[${sig.type}]</span> 助走:${tMove} / レンジ:${sig.rat.range.toFixed(2)} / 比率変:${rMove}`;
                        } else {
                            infoHtml += ` &nbsp;|&nbsp; <span style="color:${col};font-weight:bold;">[${sig.type} PO発生]</span>`;
                        }
                    }
                    this.info.innerHTML = infoHtml;
                }
            }
        }
    }

    masterChart = new FXChart('USDJPY');

    document.getElementById('fileIn').onchange = async (e) => {
        const file = e.target.files[0]; 
        if (!file) return;
        statusEl.innerText = "読み込み中...";
        const text = await file.text();
        
        const parsed = text.split(/\r?\n/).filter(l => l.includes(',')).map(l => {
            const c = l.split(',');
            return { t: parseDate(c[0]), v: parseFloat(c[2]), p: c[3] ? parseFloat(c[3]) : NaN };
        }).filter(d => d.t !== null).sort((a, b) => a.t - b.t);

        masterChart.update(parsed, null);
        statusEl.innerText = "データ読み込み完了";
    };

    pivotInput.oninput = (e) => {
        const lines = e.target.value.split('\n');
        lines.forEach(line => {
            const p = line.split(/\s+/).filter(x => x.length > 0);
            if (p.length < 5) return;
            const n = p.slice(1).map(x => parseFloat(x)).filter(v => !isNaN(v));
            if (n.length >= 5 && masterChart) masterChart.update(null, { P: n[3], R1: n[2], R2: n[1], S1: n[4], S2: n[5] });
        });
    };
</script>
</body>
</html>
