<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FX Multi-Pair Dashboard</title>
    <style>
        :root { --bg: #131722; --panel: #1e222d; --text: #d1d4dc; --blue: #2962ff; --cyan: #00bcd4; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        
        header { 
            padding: 12px; background: var(--panel); border-bottom: 1px solid #363c4e; 
            display: flex; flex-direction: column; gap: 10px; flex-shrink: 0;
        }
        .upload-row { display: flex; gap: 10px; align-items: center; }
        .file-label { 
            background: var(--blue); color: white; padding: 6px 12px; border-radius: 4px; 
            font-size: 13px; cursor: pointer; font-weight: bold;
        }
        input[type="file"] { display: none; }
        #status { font-size: 11px; color: #888; }

        /* 可変グリッド：データがある分だけ自動で並ぶ */
        #dashboard { 
            flex-grow: 1; overflow-y: auto; padding: 10px;
            display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 15px;
        }
        .chart-card { 
            background: var(--panel); border-radius: 8px; border: 1px solid #333;
            height: 320px; display: flex; flex-direction: column;
        }
        .chart-header { padding: 8px 12px; background: rgba(255,255,255,0.05); font-weight: bold; font-size: 13px; color: var(--cyan); }
        .canvas-wrapper { flex-grow: 1; position: relative; min-height: 0; }
        canvas { width: 100%; height: 100%; }
        
        .controls { padding: 8px; display: flex; gap: 8px; font-size: 10px; border-top: 1px solid #333; }
        .controls input { flex: 1; }
    </style>
</head>
<body>

<header>
    <div class="upload-row">
        <label class="file-label">📂 CSV/Pivotファイルを選択 (複数可)
            <input type="file" id="fileIn" multiple accept=".csv">
        </label>
        <span id="status">ファイルを読み込んでください</span>
    </div>
</header>

<div id="dashboard"></div>

<script>
    const dashboard = document.getElementById('dashboard');
    const statusEl = document.getElementById('status');
    const chartMap = new Map(); // ペア名 -> チャートインスタンス

    // ペア判別用キーワード
    const pairKeywords = ["USDJPY", "EURJPY", "GBPJPY", "EURUSD", "GBPUSD", "AUDUSD", "GOLD"];

    // ファイル選択時の処理
    document.getElementById('fileIn').addEventListener('change', async (e) => {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;

        for (const file of files) {
            const text = await file.text();
            const fileName = file.name.toUpperCase();
            
            // ファイル名からペア名を推測
            const pair = pairKeywords.find(k => fileName.includes(k)) || "UNKNOWN";
            const isPivot = fileName.includes("PIVOT");

            // チャートがなければ作成、あれば取得
            let chart = chartMap.get(pair);
            if (!chart) {
                chart = new FXChart(pair);
                chartMap.set(pair, chart);
            }

            // データの流し込み
            if (isPivot) {
                chart.dataPivot = parsePivotCSV(text);
                statusEl.innerText = `${pair} Pivot 読み込み完了`;
            } else {
                chart.dataH1 = parseCSV(text);
                // SMAなどの計算ロジック（前回のコードを継承）をここに実行
                statusEl.innerText = `${pair} H1 読み込み完了`;
            }
            chart.draw();
        }
    });

    class FXChart {
        constructor(pair) {
            this.pair = pair;
            this.dataH1 = [];
            this.dataPivot = [];
            this.zoom = 120;
            this.scroll = 100;
            this.initDOM();
        }

        initDOM() {
            const card = document.createElement('div');
            card.className = 'chart-card';
            card.innerHTML = `
                <div class="chart-header">${this.pair}</div>
                <div class="canvas-wrapper"><canvas></canvas></div>
                <div class="controls">
                    <input type="range" class="zoom-sld" min="24" max="500" value="120">
                    <input type="range" class="scroll-sld" min="0" max="100" value="100">
                </div>
            `;
            dashboard.appendChild(card);
            this.canvas = card.querySelector('canvas');
            this.ctx = this.canvas.getContext('2d');
            
            card.querySelector('.zoom-sld').oninput = (e) => { this.zoom = e.target.value; this.draw(); };
            card.querySelector('.scroll-sld').oninput = (e) => { this.scroll = e.target.value; this.draw(); };
        }

        draw() {
            // 前回の描画ロジック（drawLine, getYPriceなど）をここに集約
            const ctx = this.ctx;
            const w = this.canvas.clientWidth;
            const h = this.canvas.clientHeight;
            this.canvas.width = w * window.devicePixelRatio;
            this.canvas.height = h * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
            
            ctx.fillStyle = "#131722";
            ctx.fillRect(0, 0, w, h);
            
            // データ描画処理...
            ctx.fillStyle = "white";
            ctx.fillText(`${this.pair}: ${this.dataH1.length} points`, 10, 20);
        }
    }

    // CSV/Pivotパース関数（ご提示のコードから移植してください）
    function parseCSV(text) { /* 既存のロジック */ return []; }
    function parsePivotCSV(text) { /* 既存のロジック */ return []; }
</script>
</body>
</html>
