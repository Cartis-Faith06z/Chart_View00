<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FX Dashboard - Business Days Only</title>
    <style>
        :root { --bg: #131722; --panel: #1e222d; --text: #d1d4dc; --blue: #2962ff; --orange: #ff9800; --green: #4caf50; --price: #ffffff; --grid: #2b2b43; --cyan: #00bcd4; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; overflow: hidden; touch-action: none; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 10px; background: var(--panel); border-bottom: 1px solid #363c4e; flex-shrink: 0; }
        .file-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .file-input-group { background: #2a2e39; border: 1px solid #444; padding: 5px; border-radius: 4px; }
        .file-input-group label { display: block; font-size: 10px; color: var(--cyan); font-weight: bold; margin-bottom: 3px; }
        input[type="file"] { font-size: 11px; width: 100%; color: #aaa; }
        
        .chart-container { position: relative; flex-grow: 1; background: var(--bg); overflow: hidden; }
        canvas { width: 100%; height: 100%; }
        
        .view-controls { background: #1e222d; padding: 10px; border-top: 1px solid #333; font-size: 11px; flex-shrink: 0; }
        .slider-box { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .slider-box label { width: 60px; }
        input[type="range"] { flex: 1; accent-color: var(--blue); }
        
        #log { background: #000; color: #0f0; font-family: monospace; font-size: 10px; padding: 2px 10px; height: 18px; overflow: hidden; flex-shrink: 0; }
        #tooltip { position: absolute; background: rgba(30, 34, 45, 0.95); border: 1px solid #485c7b; padding: 8px; border-radius: 4px; font-size: 11px; pointer-events: none; display: none; z-index: 100; min-width: 180px; }
        .tt-date { color: #fff; border-bottom: 1px solid #444; margin-bottom: 4px; font-weight: bold; }
        .tt-row { display: flex; justify-content: space-between; gap: 10px; line-height: 1.4; }
        
        .legend { display: flex; justify-content: center; gap: 10px; padding: 5px; background: var(--panel); font-size: 9px; border-top: 1px solid #363c4e; flex-wrap: wrap; flex-shrink: 0; }
        .legend-item { display: flex; align-items: center; gap: 4px; }
        .line-box { width: 12px; height: 3px; }
    </style>
</head>
<body>

<header>
    <div class="file-controls">
        <div class="file-input-group"><label>1. 1時間足 (H1)</label><input type="file" id="h1In"></div>
        <div class="file-input-group"><label>2. Pivot (任意)</label><input type="file" id="pivotIn"></div>
    </div>
</header>

<div id="log">ログ: H1 CSVを読み込んでください。土日は自動でカットされます。</div>

<div class="chart-container" id="container">
    <div id="tooltip"></div>
    <canvas id="mainCanvas"></canvas>
</div>

<div class="view-controls">
    <div class="slider-box"><label>表示範囲</label><input type="range" id="zoom" min="24" max="500" value="120"><span id="zoomDisp">120本</span></div>
    <div class="slider-box"><label>表示位置</label><input type="range" id="scroll" min="0" max="100" value="100"><span>最新</span></div>
</div>

<div class="legend">
    <div class="legend-item"><div class="line-box" style="background:rgba(255,255,255,0.3)"></div>価格</div>
    <div class="legend-item"><div class="line-box" style="background:var(--blue); height:4px;"></div>前営業日23時→翌営業日23時</div>
    <div class="legend-item"><div class="line-box" style="background:var(--orange)"></div>H1比率</div>
    <div class="legend-item"><div class="line-box" style="background:var(--green); border-top:1px dashed white"></div>H1 10SMA</div>
</div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const logEl = document.getElementById('log');
    const tooltip = document.getElementById('tooltip');
    const container = document.getElementById('container');
    const zoomSld = document.getElementById('zoom');
    const scrollSld = document.getElementById('scroll');
    const zoomDisp = document.getElementById('zoomDisp');

    let dataH1 = [], dataSMA = [], dataPriceSMA = [], dataShiftedTrend = [];
    let mouseX = -1;
    const pad = { top: 20, right: 65, bottom: 30, left: 10, gap: 25 };

    function writeLog(m) { logEl.innerText = "> " + m; }

    function parseCSVDate(s) {
        if (!s) return null;
        try {
            const clean = s.trim().replace(/-/g, '/');
            const parts = clean.split(' ');
            const d = parts[0].split('/');
            let h = 0, m = 0;
            if (parts.length > 1) { const t = parts[1].split(':'); h = parseInt(t[0]); m = parseInt(t[1] || 0); }
            const dt = new Date(parseInt(d[0]), parseInt(d[1]) - 1, parseInt(d[2]), h, m, 0);
            return isNaN(dt.getTime()) ? null : Math.floor(dt.getTime() / 1000);
        } catch(e) { return null; }
    }

    function parseCSV(text) {
        const lines = text.split(/\r?\n/).filter(l => l.includes(','));
        const res = [];
        for (let i = 1; i < lines.length; i++) {
            const c = lines[i].split(',');
            if (c.length < 3) continue;
            const t = parseCSVDate(c[0]);
            if (t === null) continue;
            const vRaw = parseFloat(c[2]);
            const pRaw = c[3] ? parseFloat(c[3]) : NaN;
            if (!isNaN(vRaw)) res.push({ t, v: vRaw, p: isNaN(pRaw) ? null : pRaw });
        }
        return res.sort((a, b) => a.t - b.t);
    }

    function getSMA(data, n, field = 'v') {
        return data.map((d, i) => {
            if (i < n - 1) return { t: d.t, v: NaN };
            let sum = 0, count = 0;
            for (let j = 0; j < n; j++) {
                const val = data[i - j][field];
                if (val !== null && !isNaN(val)) { sum += val; count++; }
            }
            return { t: d.t, v: count === n ? sum / n : NaN };
        });
    }

    function draw() {
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
        ctx.scale(dpr, dpr);
        const w = rect.width, h = rect.height;
        ctx.fillStyle = "#131722"; ctx.fillRect(0, 0, w, h);

        if (dataH1.length === 0) return;

        // --- インデックスベースの計算 ---
        const totalPoints = dataH1.length;
        const viewRange = parseInt(zoomSld.value);
        zoomDisp.innerText = viewRange + "本";
        
        const maxScroll = totalPoints - viewRange;
        const startIdx = Math.max(0, Math.floor(maxScroll * (parseInt(scrollSld.value) / 100)));
        const endIdx = Math.min(totalPoints - 1, startIdx + viewRange);

        const getX = (idx) => pad.left + (idx - startIdx) / (endIdx - startIdx) * (w - pad.left - pad.right);

        const splitY = h * 0.45, pTop = pad.top, pBot = splitY, rTop = splitY + pad.gap, rBot = h - pad.bottom;

        // 表示範囲のデータ
        let visible = dataH1.slice(startIdx, endIdx + 1);
        let vList = visible.map(d => d.v);
        const vLo = Math.min(...vList) - 1.5, vHi = Math.max(...vList) + 1.5, vR = vHi - vLo || 1;
        let pList = visible.filter(d => d.p !== null).map(d => d.p);
        const pLo = pList.length > 0 ? Math.min(...pList) * 0.999 : 0;
        const pHi = pList.length > 0 ? Math.max(...pList) * 1.001 : 1;
        const pR = pHi - pLo || 0.001;

        const getYRatio = (v) => rBot - ((v - vLo) / vR) * (rBot - rTop);
        const getYPrice = (p) => pBot - ((p - pLo) / pR) * (pBot - pTop);

        // 縦グリッド（日付の境界）
        ctx.lineWidth = 1; ctx.setLineDash([2, 2]);
        for (let i = startIdx; i <= endIdx; i++) {
            const d = dataH1[i];
            const prev = dataH1[i-1];
            if (prev && new Date(d.t*1000).getDate() !== new Date(prev.t*1000).getDate()) {
                const x = getX(i);
                ctx.strokeStyle = "#444"; ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
                ctx.fillStyle = "#888"; ctx.font = "9px sans-serif"; ctx.textAlign = "center";
                ctx.fillText(new Date(d.t*1000).toLocaleDateString(undefined, {month:'short', day:'numeric'}), x, h - 5);
            }
        }
        ctx.setLineDash([]);

        const drawLine = (dataArr, field, color, weight, yFunc, dash = [], isTrend = false) => {
            ctx.strokeStyle = color; ctx.lineWidth = weight; ctx.setLineDash(dash); ctx.beginPath();
            let first = true;
            for (let i = startIdx; i <= endIdx; i++) {
                const targetT = dataH1[i].t;
                // 通常データまたはトレンドデータを検索
                const item = isTrend ? dataArr.find(d => d.t === targetT) : dataArr[i];
                if (!item || isNaN(item[field])) continue;
                
                const x = getX(i); const y = yFunc(item[field]);
                if (first) { ctx.moveTo(x, y); first = false; } else { ctx.lineTo(x, y); }
            }
            ctx.stroke(); ctx.setLineDash([]);
        };

        // 描画実行
        drawLine(dataH1, 'v', "#ff9800", 1, getYRatio);
        drawLine(dataSMA, 'v', "#4caf50", 1.5, getYRatio, [4, 4]);
        drawLine(dataShiftedTrend, 'v', "#2962ff", 3, getYRatio, [], true); // トレンド線
        drawLine(dataH1, 'p', "rgba(255,255,255,0.2)", 1, getYPrice);
        drawLine(dataPriceSMA, 'v', "#00bcd4", 2, getYPrice);

        // ツールチップ
        if (mouseX > pad.left && mouseX < w - pad.right) {
            const hoverIdx = Math.round(startIdx + ((mouseX - pad.left) / (w - pad.left - pad.right)) * (endIdx - startIdx));
            const d = dataH1[Math.min(totalPoints-1, Math.max(0, hoverIdx))];
            if (d) {
                const x = getX(hoverIdx);
                ctx.strokeStyle = "rgba(255,255,255,0.4)"; ctx.beginPath(); ctx.moveTo(x, pad.top); ctx.lineTo(x, rBot); ctx.stroke();
                tooltip.style.display = "block"; tooltip.style.left = (x > w - 200 ? x - 190 : x + 10) + "px"; tooltip.style.top = "100px";
                const trendVal = dataShiftedTrend.find(st => st.t === d.t);
                tooltip.innerHTML = `<div class="tt-date">${new Date(d.t*1000).toLocaleString()}</div>
                    <div class="tt-row"><span style="color:var(--blue)">方向性指標:</span><span>${trendVal ? trendVal.v.toFixed(1) : '--'}%</span></div>
                    <div class="tt-row"><span style="color:var(--orange)">H1比率:</span><span>${(d.v).toFixed(1)}%</span></div>
                    <div class="tt-row"><span style="color:var(--green)">SMA:</span><span>${(dataSMA[hoverIdx]?.v || 0).toFixed(1)}%</span></div>`;
            }
        } else tooltip.style.display = "none";
    }

    function initIn(id, type) {
        document.getElementById(id).addEventListener('change', e => {
            const f = e.target.files[0]; if(!f) return;
            const r = new FileReader();
            r.onload = ev => {
                dataH1 = parseCSV(ev.target.result); 
                dataSMA = getSMA(dataH1, 10, 'v'); 
                dataPriceSMA = getSMA(dataH1, 10, 'p'); 
                
                // 【修正：営業日ベースのトレンド紐付け】
                dataShiftedTrend = [];
                const entries23 = dataH1.filter(d => new Date(d.t * 1000).getHours() === 23);
                for (let i = 0; i < entries23.length - 1; i++) {
                    // 「前の23時」の値を「現在の23時」の時刻に割り当てる
                    dataShiftedTrend.push({ t: entries23[i+1].t, v: entries23[i].v });
                }
                writeLog(f.name + " 完了（土日カット済）"); draw();
            };
            r.readAsText(f);
        });
    }

    initIn('h1In', 'h1');
    zoomSld.oninput = draw; scrollSld.oninput = draw;
    const handleMove = e => {
        const r = canvas.getBoundingClientRect(); 
        const cx = e.clientX !== undefined ? e.clientX : (e.touches && e.touches[0] ? e.touches[0].clientX : -1);
        if(cx === -1) return; mouseX = cx - r.left; draw();
    };
    container.addEventListener('mousemove', handleMove); container.addEventListener('touchstart', handleMove);
    container.addEventListener('touchmove', handleMove); container.addEventListener('mouseleave', () => { mouseX = -1; draw(); });
    window.onresize = draw; window.onload = draw;
</script>
</body>
</html>
