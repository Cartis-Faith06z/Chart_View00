<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FX Dashboard v1.1.9</title>
    <style>
        :root { --bg: #131722; --panel: #1e222d; --text: #d1d4dc; --blue: #2962ff; --cyan: #00bcd4; --orange: #ff9800; --green: #4caf50; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; display: flex; flex-direction: column; height: 100vh; height: 100dvh; overflow: hidden; }
        header { padding: 10px; background: var(--panel); border-bottom: 1px solid #363c4e; flex-shrink: 0; display: flex; justify-content: space-between; align-items: center; }
        .upload-row { display: flex; gap: 10px; align-items: center; }
        .file-label { background: var(--blue); color: white; padding: 8px 15px; border-radius: 4px; font-size: 13px; cursor: pointer; font-weight: bold; }
        input[type="file"] { display: none; }
        #status { font-size: 11px; color: var(--cyan); }
        #dashboard { flex-grow: 1; overflow-y: auto; padding: 10px; display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 15px; }
        .chart-card { background: var(--panel); border-radius: 8px; border: 1px solid #333; height: 420px; display: flex; flex-direction: column; overflow: hidden; }
        .chart-header { padding: 8px 12px; background: rgba(255,255,255,0.05); font-size: 12px; display: flex; justify-content: space-between; border-bottom: 1px solid #333; flex-shrink: 0; }
        .info-display { color: #fff; font-family: monospace; font-weight: bold; }
        .canvas-wrapper { flex-grow: 1; position: relative; cursor: crosshair; touch-action: none; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .controls { padding: 10px; border-top: 1px solid #333; background: var(--panel); z-index: 20; }
        .sld-group { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        input[type="range"] { flex-grow: 1; height: 38px; accent-color: var(--blue); touch-action: pan-x; }
    </style>
</head>
<body>

<header>
    <div class="upload-row">
        <label class="file-label">📂 まとめて選択 (H1 & Daily)
            <input type="file" id="fileIn" multiple accept=".csv, text/csv">
        </label>
        <span id="status">ファイルを読み込んでください</span>
    </div>
    <div style="font-size:10px; color:#5d606b">v1.1.9</div>
</header>

<div id="dashboard"></div>

<script>
    const dashboard = document.getElementById('dashboard');
    const statusEl = document.getElementById('status');
    const chartMap = new Map(); 
    const pairKeywords = ["USDJPY", "EURJPY", "GBPJPY", "EURUSD", "GBPUSD", "AUDUSD", "GOLD"];

    function parseDate(s) {
        if (!s) return null;
        const clean = s.trim().replace(/\./g, '/').replace(/-/g, '/');
        const dt = new Date(clean);
        return isNaN(dt.getTime()) ? null : Math.floor(dt.getTime() / 1000);
    }

    function parseH1CSV(text) {
        const lines = text.split(/\r?\n/).filter(l => l.includes(','));
        const res = [];
        for (let i = 1; i < lines.length; i++) {
            const c = lines[i].split(',');
            if (c.length < 3) continue;
            const t = parseDate(c[0]);
            if (t === null) continue;
            res.push({ t, v: parseFloat(c[2]), p: c[3] ? parseFloat(c[3]) : NaN });
        }
        return res.sort((a, b) => a.t - b.t);
    }

    function parseMT5Daily(text) {
        const delimiter = text.includes('\t') ? '\t' : ',';
        const lines = text.split(/\r?\n/).filter(l => l.trim().length > 0);
        const daily = [];
        for (let i = 1; i < lines.length; i++) {
            const c = lines[i].split(delimiter);
            if (c.length < 5) continue;
            const t = parseDate(c[0]);
            if (t === null) continue;
            daily.push({ t, h: parseFloat(c[2]), l: parseFloat(c[3]), c: parseFloat(c[4]) });
        }
        daily.sort((a, b) => a.t - b.t);
        const pivots = [];
        for (let i = 0; i < daily.length - 1; i++) {
            const prev = daily[i];
            const P = (prev.h + prev.l + prev.c) / 3;
            pivots.push({ 
                t: daily[i+1].t, 
                levels: { 
                    P, R1: (2*P)-prev.l, R2: P+prev.h-prev.l, R3: ((2*P)-prev.l)+prev.h-prev.l,
                    S1: (2*P)-prev.h, S2: P-prev.h+prev.l, S3: ((2*P)-prev.h)-prev.h+prev.l
                } 
            });
        }
        return pivots;
    }

    class FXChart {
        constructor(pair) {
            this.pair = pair;
            this.dataH1 = []; this.dataSMA = []; this.dataPriceSMA = [];
            this.dataPvt = []; this.dataShiftedTrend = [];
            this.zoom = 120; this.scroll = 100; this.mouseX = -1;
            this.initDOM();
        }

        initDOM() {
            const card = document.createElement('div');
            card.className = 'chart-card';
            card.innerHTML = `
                <div class="chart-header"><span style="color:var(--cyan);font-weight:bold">${this.pair}</span><span class="info-display">-</span></div>
                <div class="canvas-wrapper"><canvas></canvas></div>
                <div class="controls">
                    <div class="sld-group"><label>範囲</label><input type="range" class="zoom-sld" min="24" max="500" value="120"></div>
                    <div class="sld-group"><label>位置</label><input type="range" class="scroll-sld" min="0" max="100" value="100"></div>
                </div>
            `;
            dashboard.appendChild(card);
            this.canvas = card.querySelector('canvas');
            this.ctx = this.canvas.getContext('2d');
            this.info = card.querySelector('.info-display');
            card.querySelector('.zoom-sld').oninput = (e) => { this.zoom = parseInt(e.target.value); this.draw(); };
            card.querySelector('.scroll-sld').oninput = (e) => { this.scroll = parseInt(e.target.value); this.draw(); };
            const handleMove = (e) => {
                const rect = this.canvas.getBoundingClientRect();
                const cx = e.clientX || (e.touches && e.touches[0] ? e.touches[0].clientX : -1);
                if(cx === -1) return;
                this.mouseX = cx - rect.left;
                this.draw();
            };
            this.canvas.addEventListener('mousemove', handleMove);
            this.canvas.addEventListener('touchstart', handleMove, {passive: true});
            this.canvas.addEventListener('touchmove', handleMove, {passive: true});
        }

        update(h1, pvt) {
            if(h1) {
                this.dataH1 = h1;
                const last = h1[h1.length-1];
                const next0 = new Date(last.t*1000); next0.setHours(24,0,0,0);
                if(!this.dataH1.find(d => d.t === Math.floor(next0.getTime()/1000))) {
                    this.dataH1.push({t: Math.floor(next0.getTime()/1000), v: NaN, p: NaN});
                }
                const sma = (d, n, f) => d.map((_, i) => {
                    if (i < n - 1) return { t: d[i].t, v: NaN };
                    let sum = 0; for (let j = 0; j < n; j++) sum += d[i-j][f];
                    return { t: d[i].t, v: sum / n };
                });
                this.dataSMA = sma(this.dataH1, 10, 'v');
                this.dataPriceSMA = sma(this.dataH1, 10, 'p');
                this.dataShiftedTrend = [];
                const idx23 = [];
                this.dataH1.forEach((d, i) => { if(new Date(d.t*1000).getHours() === 23) idx23.push(i); });
                for(let i=0; i<idx23.length; i++) {
                    if(i>0) this.dataShiftedTrend.push({t: this.dataH1[idx23[i]].t, v: this.dataH1[idx23[i-1]].v});
                }
                if(idx23.length > 0) this.dataShiftedTrend.push({t: this.dataH1[this.dataH1.length-1].t, v: this.dataH1[idx23[idx23.length-1]].v});
            }
            if(pvt) this.dataPvt = pvt;
            this.draw();
        }

        draw() {
            const ctx = this.ctx;
            const w = this.canvas.clientWidth, h = this.canvas.clientHeight;
            const dpr = window.devicePixelRatio || 1;
            this.canvas.width = w * dpr; this.canvas.height = h * dpr;
            ctx.scale(dpr, dpr);
            ctx.fillStyle = "#131722"; ctx.fillRect(0, 0, w, h);
            if (this.dataH1.length === 0) return;

            const viewCount = Math.min(this.zoom, this.dataH1.length);
            const startIdx = Math.floor((this.dataH1.length - viewCount) * (this.scroll / 100));
            const endIdx = Math.min(this.dataH1.length - 1, startIdx + viewCount);

            const getX = (i) => 10 + (i - startIdx) / viewCount * (w - 75);
            const splitY = h * 0.55, pBot = splitY - 15, rTop = splitY + 15, rBot = h - 25;

            const visible = this.dataH1.slice(startIdx, endIdx + 1);
            const pL = visible.map(d => d.p).filter(p => !isNaN(p));
            const pLo = Math.min(...pL), pHi = Math.max(...pL), pR = (pHi - pLo || 0.01) * 1.3;
            const getYp = (p) => pBot - ((p - (pLo - pR*0.1)) / pR) * (pBot - 25);
            const vL = visible.map(d => d.v).filter(v => !isNaN(v));
            const vLo = Math.min(...vL) - 1, vHi = Math.max(...vL) + 1, vR = vHi - vLo || 1;
            const getYr = (v) => rBot - ((v - vLo) / vR) * (rBot - rTop);

            ctx.strokeStyle = "#2b2b43"; ctx.lineWidth = 0.5;
            ctx.beginPath(); ctx.moveTo(0, splitY); ctx.lineTo(w, splitY); ctx.stroke();

            const path = (arr, f, col, lw, yf, dash=[], isTrend=false) => {
                ctx.strokeStyle = col; ctx.lineWidth = lw; ctx.setLineDash(dash);
                ctx.beginPath(); let first = true;
                for(let i = startIdx; i <= endIdx; i++) {
                    const it = isTrend ? arr.find(d => d.t === this.dataH1[i].t) : arr[i];
                    if(!it || isNaN(it[f])) continue;
                    const x = getX(i), y = yf(it[f]);
                    if(first) { ctx.moveTo(x,y); first=false; } else ctx.lineTo(x,y);
                }
                ctx.stroke(); ctx.setLineDash([]);
            };

            path(this.dataPriceSMA, 'v', "rgba(0,188,212,0.4)", 3, getYp);
            path(this.dataH1, 'p', "#fff", 1, getYp);
            path(this.dataH1, 'v', "#ff9800", 1, getYr);
            path(this.dataSMA, 'v', "#4caf50", 1.2, getYr, [4,4]);
            path(this.dataShiftedTrend, 'v', "#2962ff", 3, getYr, [], true);

            this.dataPvt.forEach(p => {
                const sIdx = this.dataH1.findIndex(d => d.t >= p.t);
                if (sIdx !== -1 && sIdx <= endIdx) {
                    const eIdx = this.dataH1.findIndex(d => d.t >= p.t + 86400);
                    const dxS = getX(Math.max(startIdx, sIdx)), dxE = getX(eIdx === -1 || eIdx > endIdx ? endIdx + 1 : eIdx);
                    Object.entries(p.levels).forEach(([k, val]) => {
                        const y = getYp(val);
                        ctx.strokeStyle = k==='P'?"rgba(255,255,255,0.4)":k[0]==='R'?"rgba(255,100,100,0.2)":"rgba(100,100,255,0.2)";
                        ctx.setLineDash([2,2]); ctx.beginPath(); ctx.moveTo(dxS, y); ctx.lineTo(dxE, y); ctx.stroke();
                    });
                }
            });

            if(this.mouseX > 0) {
                const relX = (this.mouseX - 10) / (w - 75);
                const hIdx = Math.round(startIdx + relX * viewCount);
                const d = this.dataH1[Math.max(0, Math.min(this.dataH1.length-1, hIdx))];
                if(d) {
                    ctx.strokeStyle = "rgba(255,255,255,0.3)";
                    ctx.beginPath(); ctx.moveTo(getX(hIdx), 0); ctx.lineTo(getX(hIdx), h); ctx.stroke();
                    this.info.innerText = `${new Date(d.t*1000).toLocaleString('ja-JP')} P:${d.p.toFixed(3)}`;
                }
            }
        }
    }

    document.getElementById('fileIn').onchange = async (e) => {
        const files = Array.from(e.target.files);
        statusEl.innerText = "読込中...";
        const pool = {};
        for (const file of files) {
            const text = await file.text();
            const fName = file.name.toUpperCase();
            const pair = pairKeywords.find(k => fName.includes(k));
            if (!pair) continue;
            if (!pool[pair]) pool[pair] = { h1: null, pvt: null };
            if (text.includes('<DATE>') || fName.includes('DAILY')) pool[pair].pvt = parseMT5Daily(text);
            else pool[pair].h1 = parseH1CSV(text);
        }
        for (const [pair, data] of Object.entries(pool)) {
            let chart = chartMap.get(pair);
            if (!chart) { chart = new FXChart(pair); chartMap.set(pair, chart); }
            chart.update(data.h1, data.pvt);
        }
        statusEl.innerText = "完了";
    };
</script>
</body>
</html>
