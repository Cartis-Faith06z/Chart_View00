<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>USDJPY NY Sniper v1.3.0</title>
    <style>
        :root { --bg: #131722; --panel: #1e222d; --text: #d1d4dc; --blue: #2962ff; --cyan: #00bcd4; --red: #f44336; --yellow: #ffeb3b; --green: #4caf50; --orange: #ff9800; }
        * { box-sizing: border-box; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; display: flex; flex-direction: column; height: 100vh; height: 100dvh; overflow: hidden; }
        header { padding: 8px 12px; background: var(--panel); border-bottom: 1px solid #363c4e; flex-shrink: 0; display: flex; flex-direction: column; gap: 8px; }
        .row { display: flex; gap: 10px; align-items: center; justify-content: space-between; }
        .file-label { background: var(--blue); color: white; padding: 8px 16px; border-radius: 4px; font-size: 13px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .file-label:hover { background: #1e4eb8; }
        input[type="file"] { display: none; }
        
        #dashboard { flex-grow: 1; padding: 12px; display: flex; flex-direction: column; overflow: hidden; }
        .chart-card { background: var(--panel); border: 1px solid #363c4e; border-radius: 6px; display: flex; flex-direction: column; flex-grow: 1; overflow: hidden; }
        .chart-header { padding: 8px 12px; border-bottom: 1px solid #363c4e; display: flex; justify-content: space-between; align-items: center; font-size: 14px; flex-shrink: 0; background: #232836; }
        .info-display { font-family: monospace; font-size: 12px; white-space: nowrap; overflow: hidden; }
        .canvas-wrapper { flex-grow: 1; position: relative; min-height: 0; cursor: crosshair; }
        canvas { display: block; width: 100%; height: 100%; touch-action: none; }
        .controls { padding: 8px 16px; border-top: 1px solid #363c4e; display: flex; flex-shrink: 0; background: #1a1e28; align-items: center; gap: 15px;}
        .zoom-sld { flex-grow: 1; accent-color: var(--cyan); cursor: pointer; }
        .legend { display: flex; gap: 10px; font-size: 10px; color: #888; }
        .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
    </style>
</head>
<body>
<header>
    <div class="row">
        <div style="display:flex; gap:15px; align-items:center;">
            <label class="file-label">CSV読込<input type="file" id="fileIn" accept=".csv"></label>
            <span id="status" style="font-size:12px;color:#888;">USDJPY 1時間足データを読み込んでください</span>
        </div>
        <div style="text-align: right;">
            <div style="font-size:16px; font-weight:bold; color:var(--cyan);">USDJPY NY Sniper System</div>
            <div style="font-size:10px; color:#555;">Version 1.3.0</div>
        </div>
    </div>
</header>
<div id="dashboard"></div>

<script>
    const CONFIG = { 'USDJPY': { th: 0.5 } };
    const dashboard = document.getElementById('dashboard');
    const statusEl = document.getElementById('status');
    let masterChart = null;

    const parseDate = (dStr) => {
        if (!dStr) return null;
        let d = new Date(dStr.replace(' ', 'T') + 'Z');
        if (isNaN(d.getTime())) return null;
        return d.getTime() / 1000;
    };

    class FXChart {
        constructor(pair) {
            this.pair = pair; 
            this.dataH1 = []; 
            this.dataSMA10 = []; this.dataSMA20 = []; this.dataSMA75 = []; // 比率用SMA
            this.dataPriceSMA = []; // 価格用SMA
            this.dataShiftedTrend = [];
            this.zoom = 120; this.mouseX = -1; this.viewOffset = 0;
            this.signals = []; 
            this.initDOM();
        }

        initDOM() {
            const card = document.createElement('div');
            card.className = 'chart-card';
            card.innerHTML = `
                <div class="chart-header">
                    <span style="color:var(--cyan);font-weight:bold;font-size:16px;">${this.pair}</span>
                    <span class="info-display">-</span>
                </div>
                <div class="canvas-wrapper"><canvas></canvas></div>
                <div class="controls">
                    <div class="legend">
                        <span><span class="dot" style="background:var(--yellow)"></span>Ratio 10SMA</span>
                        <span><span class="dot" style="background:var(--green)"></span>Ratio 20SMA</span>
                        <span><span class="dot" style="background:var(--orange)"></span>Ratio 75SMA</span>
                    </div>
                    <input type="range" class="zoom-sld" min="24" max="1500" value="120">
                    <button id="resetBtn" style="background:#363c4e;color:#fff;border:none;padding:5px 10px;border-radius:4px;cursor:pointer;font-size:11px;">最新へ</button>
                </div>`;
            dashboard.appendChild(card);
            this.canvas = card.querySelector('canvas'); this.ctx = this.canvas.getContext('2d'); this.info = card.querySelector('.info-display');
            card.querySelector('.zoom-sld').oninput = (e) => { this.zoom = parseInt(e.target.value); this.draw(); };
            card.querySelector('#resetBtn').onclick = () => { this.viewOffset = 0; this.draw(); };

            // ドラッグ移動(パン)
            let isDragging = false; let startX = 0; let startOffset = 0;
            const updateMouseX = (clientX) => {
                const rect = this.canvas.getBoundingClientRect();
                this.mouseX = clientX - rect.left;
            };
            this.canvas.addEventListener('mousedown', (e) => { isDragging = true; startX = e.clientX; startOffset = this.viewOffset; this.canvas.style.cursor = 'grabbing'; });
            window.addEventListener('mouseup', () => { isDragging = false; this.canvas.style.cursor = 'crosshair'; });
            this.canvas.addEventListener('mousemove', (e) => {
                updateMouseX(e.clientX);
                if (isDragging) {
                    const dx = e.clientX - startX;
                    const pxPerCandle = (this.canvas.clientWidth - 75) / this.zoom;
                    this.viewOffset = startOffset + dx / pxPerCandle;
                }
                this.draw();
            });
            // タッチ操作
            this.canvas.addEventListener('touchstart', (e) => { if(e.touches.length === 1) { isDragging = true; startX = e.touches[0].clientX; startOffset = this.viewOffset; } }, {passive:true});
            this.canvas.addEventListener('touchmove', (e) => { if(e.touches.length === 1) { updateMouseX(e.touches[0].clientX); if (isDragging) { const dx = e.touches[0].clientX - startX; const pxPerCandle = (this.canvas.clientWidth - 75) / this.zoom; this.viewOffset = startOffset + dx / pxPerCandle; } this.draw(); } }, {passive:true});
            this.canvas.addEventListener('touchend', () => isDragging = false);
        }

        update(h1) {
            if(h1) {
                this.dataH1 = h1;
                const sma = (d, n, f) => d.map((_, i) => (i < n - 1) ? { t: d[i].t, v: NaN } : { t: d[i].t, v: d.slice(i-n+1, i+1).reduce((acc, curr) => acc + curr[f], 0) / n });
                // 比率SMAの強化
                this.dataSMA10 = sma(this.dataH1, 10, 'v');
                this.dataSMA20 = sma(this.dataH1, 20, 'v');
                this.dataSMA75 = sma(this.dataH1, 75, 'v');
                // 価格SMA
                this.dataPriceSMA = sma(this.dataH1, 10, 'p');
                
                this.dataShiftedTrend = []; let base = NaN;
                this.dataH1.forEach(d => { if (new Date(d.t * 1000).getUTCHours() === 23) base = d.v; this.dataShiftedTrend.push({ t: d.t, v: base }); });

                // サイン計算
                this.signals = [];
                const offset = 7; // 冬時間
                const getJST = (ts) => (new Date(ts * 1000).getUTCHours() + offset) % 24;
                const findH = (targetJST, startIndex) => {
                    for(let j = startIndex; j >= Math.max(0, startIndex - 24); j--) { if(getJST(this.dataH1[j].t) === targetJST) return this.dataH1[j]; }
                    return null;
                };

                for(let i = 0; i < this.dataH1.length; i++) {
                    let h = getJST(this.dataH1[i].t);
                    if (h === 22 || h === 23) {
                        let dEval = findH((h + 23) % 24, i);      // -1h
                        let dRangeS = findH((h + 21) % 24, i);    // -3h
                        let dTrendS = findH(9, i);               // 09:00
                        if (dEval && dRangeS && dTrendS) {
                            let trend = dRangeS.p - dTrendS.p, range = dEval.p - dRangeS.p, ratio = dEval.v - dRangeS.v;
                            if (Math.abs(trend) >= 0.4 && Math.abs(range) <= 0.15 && Math.abs(ratio) >= 0.6 && Math.abs(ratio) <= 0.9) {
                                this.signals.push({ idx: i, type: ratio <= -0.6 ? 'LONG' : 'SHORT', data: { trend, range, ratio } });
                            }
                        }
                    }
                }
            }
            this.viewOffset = 0; this.draw();
        }

        draw() {
            const ctx = this.ctx; const w = this.canvas.clientWidth, h = this.canvas.clientHeight;
            if (w === 0 || h === 0) return;
            const dpr = window.devicePixelRatio || 1; this.canvas.width = w * dpr; this.canvas.height = h * dpr;
            ctx.scale(dpr, dpr); ctx.fillStyle = "#131722"; ctx.fillRect(0, 0, w, h);
            if (this.dataH1.length === 0) return;

            const viewCount = Math.min(this.zoom, this.dataH1.length);
            this.viewOffset = Math.max(0, Math.min(this.viewOffset, this.dataH1.length - viewCount));
            const startIdx = Math.round(this.dataH1.length - viewCount - this.viewOffset);
            const getX = (i) => 10 + (i - startIdx) / viewCount * (w - 75);
            const splitY = h * 0.5;
            
            const visible = this.dataH1.slice(startIdx, startIdx + viewCount);
            if (visible.length === 0) return;
            const pL = visible.map(d => d.p).filter(p => !isNaN(p));
            const pLo = Math.min(...pL), pHi = Math.max(...pL), pR = (pHi - pLo || 0.01) * 1.3;
            const getYp = (p) => (splitY - 20) - ((p - (pLo - pR*0.1)) / pR) * (splitY - 40);
            const vL = visible.map(d => d.v).filter(v => !isNaN(v));
            const vLo = Math.min(...vL) - 2, vHi = Math.max(...vL) + 2, vR = vHi - vLo || 1;
            const getYr = (v) => (h - 20) - ((v - vLo) / vR) * (h - splitY - 30);

            const drawPath = (data, field, col, wd, yf, dash = []) => {
                ctx.strokeStyle = col; ctx.lineWidth = wd; ctx.setLineDash(dash); ctx.beginPath(); let f = true;
                for(let i = startIdx; i < startIdx + viewCount; i++){
                    const val = data[i]?.[field]; if(val === undefined || isNaN(val)) continue;
                    const x = getX(i), y = yf(val); if(f) { ctx.moveTo(x,y); f=false; } else ctx.lineTo(x,y);
                }
                ctx.stroke(); ctx.setLineDash([]);
            };

            // 下段描画
            drawPath(this.dataH1, 'v', "#2962ff", 2, getYr); // 比率
            drawPath(this.dataSMA10, 'v', "var(--yellow)", 1, getYr, [3, 2]); // 比率10SMA
            drawPath(this.dataSMA20, 'v', "var(--green)", 1.5, getYr); // 比率20SMA
            drawPath(this.dataSMA75, 'v', "var(--orange)", 1.5, getYr); // 比率75SMA
            drawPath(this.dataShiftedTrend, 'v', "#f44336", 2, getYr); // 赤バンド
            
            // 上段描画
            drawPath(this.dataH1, 'p', "#fff", 2, getYp); // 価格
            drawPath(this.dataPriceSMA, 'v', "var(--yellow)", 1, getYp, [2, 2]); // 価格10SMA

            // 矢印サイン描画
            this.signals.forEach(sig => {
                if (sig.idx >= startIdx && sig.idx < startIdx + viewCount) {
                    const x = getX(sig.idx);
                    const isLong = sig.type === 'LONG';
                    const yBase = getYp(this.dataH1[sig.idx].p);
                    const y = isLong ? yBase + 15 : yBase - 15;
                    const color = isLong ? "var(--cyan)" : "var(--red)";
                    
                    ctx.fillStyle = color; ctx.beginPath();
                    if(isLong) { // ↑
                        ctx.moveTo(x, y); ctx.lineTo(x-6, y+8); ctx.lineTo(x-3, y+8); ctx.lineTo(x-3, y+18);
                        ctx.lineTo(x+3, y+18); ctx.lineTo(x+3, y+8); ctx.lineTo(x+6, y+8);
                    } else { // ↓
                        ctx.moveTo(x, y); ctx.lineTo(x-6, y-8); ctx.lineTo(x-3, y-8); ctx.lineTo(x-3, y-18);
                        ctx.lineTo(x+3, y-18); ctx.lineTo(x+3, y-8); ctx.lineTo(x+6, y-8);
                    }
                    ctx.closePath(); ctx.fill();
                }
            });

            // マウスオーバー
            if(this.mouseX > 0) {
                const idx = Math.round(startIdx + (this.mouseX - 10) / (w - 75) * viewCount);
                const d = this.dataH1[Math.max(0, Math.min(this.dataH1.length-1, idx))];
                if(d) {
                    const dt = new Date(d.t * 1000);
                    const jstH = (dt.getUTCHours() + 7) % 24;
                    ctx.strokeStyle = "rgba(255,255,255,0.15)"; ctx.setLineDash([2,2]); ctx.beginPath(); ctx.moveTo(getX(idx), 0); ctx.lineTo(getX(idx), h); ctx.stroke();
                    let info = `<span style="color:var(--cyan)">${dt.getUTCMonth()+1}/${dt.getUTCDate()} ${jstH}:00</span> Price:<span style="color:#fff">${d.p.toFixed(3)}</span> Ratio:<span style="color:var(--blue)">${d.v.toFixed(1)}%</span>`;
                    const sig = this.signals.find(s => s.idx === idx);
                    if(sig) info += ` | <span style="color:${sig.type==='LONG'?'var(--cyan)':'var(--red)'};font-weight:bold">[${sig.type}]</span> 助走:${sig.data.trend.toFixed(2)} レンジ:${sig.data.range.toFixed(2)} 比率変:${sig.data.ratio.toFixed(2)}`;
                    this.info.innerHTML = info;
                }
            }
        }
    }

    masterChart = new FXChart('USDJPY');
    document.getElementById('fileIn').onchange = async (e) => {
        const file = e.target.files[0]; if (!file) return;
        statusEl.innerText = "読み込み中...";
        const text = await file.text();
        const parsed = text.split(/\r?\n/).filter(l => l.includes(',')).map(l => {
            const c = l.split(',');
            return { t: parseDate(c[0]), v: parseFloat(c[2]), p: c[3] ? parseFloat(c[3]) : NaN };
        }).filter(d => d.t !== null).sort((a, b) => a.t - b.t);
        masterChart.update(parsed);
        statusEl.innerText = "Ready";
    };
</script>
</body>
</html>
