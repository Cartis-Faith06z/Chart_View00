<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FX Dashboard - Pivot Fully Restored</title>
    <style>
        :root { --bg: #131722; --panel: #1e222d; --text: #d1d4dc; --blue: #2962ff; --orange: #ff9800; --green: #4caf50; --price: #ffffff; --grid: #2b2b43; --cyan: #00bcd4; --r1: #ff5252; --s1: #00e676; --pp: #90a4ae; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100dvh; }
        header { padding: 8px; background: var(--panel); border-bottom: 1px solid #363c4e; flex-shrink: 0; }
        .file-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .file-input-group { background: #2a2e39; border: 1px solid #444; padding: 4px; border-radius: 4px; }
        .file-input-group label { display: block; font-size: 10px; color: var(--cyan); font-weight: bold; margin-bottom: 2px; }
        input[type="file"] { font-size: 10px; width: 100%; color: #aaa; }
        .chart-container { position: relative; flex-grow: 1; background: var(--bg); overflow: hidden; }
        canvas { width: 100%; height: 100%; }
        .view-controls { background: #1e222d; padding: 12px 12px 24px 12px; border-top: 1px solid #333; font-size: 11px; flex-shrink: 0; z-index: 10; }
        .slider-box { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .slider-box label { width: 60px; font-weight: bold; }
        input[type="range"] { flex: 1; height: 30px; accent-color: var(--blue); }
        #log { background: #000; color: #0f0; font-family: monospace; font-size: 10px; padding: 2px 10px; height: 18px; overflow: hidden; flex-shrink: 0; }
        #tooltip { position: absolute; background: rgba(30, 34, 45, 0.95); border: 1px solid #485c7b; padding: 8px; border-radius: 4px; font-size: 11px; pointer-events: none; display: none; z-index: 100; min-width: 160px; }
        .legend { display: flex; justify-content: center; gap: 10px; padding: 6px; background: var(--panel); font-size: 9px; border-top: 1px solid #363c4e; flex-wrap: wrap; flex-shrink: 0; }
        .legend-item { display: flex; align-items: center; gap: 4px; }
        .line-box { width: 12px; height: 3px; }
    </style>
</head>
<body>

<header>
    <div class="file-controls">
        <div class="file-input-group"><label>1. H1 CSV</label><input type="file" id="h1In"></div>
        <div class="file-input-group"><label>2. Pivot CSV</label><input type="file" id="pivotIn"></div>
    </div>
</header>

<div id="log">ログ: H1とPivotを読み込んでください</div>

<div class="chart-container" id="container">
    <div id="tooltip"></div>
    <canvas id="mainCanvas"></canvas>
</div>

<div class="view-controls">
    <div class="slider-box"><label>表示範囲</label><input type="range" id="zoom" min="24" max="500" value="120"><span id="zoomDisp">120本</span></div>
    <div class="slider-box"><label>位置</label><input type="range" id="scroll" min="0" max="100" value="100"></div>
</div>

<div class="legend">
    <div class="legend-item"><div class="line-box" style="background:var(--pp)"></div>PP</div>
    <div class="legend-item"><div class="line-box" style="background:var(--r1)"></div>R1</div>
    <div class="legend-item"><div class="line-box" style="background:var(--s1)"></div>S1</div>
    <div class="legend-item"><div class="line-box" style="background:var(--blue); height:4px;"></div>当日方向性</div>
    <div class="legend-item"><div class="line-box" style="background:var(--orange)"></div>比率</div>
</div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const logEl = document.getElementById('log');
    const tooltip = document.getElementById('tooltip');
    const container = document.getElementById('container');
    const zoomSld = document.getElementById('zoom');
    const scrollSld = document.getElementById('scroll');
    const zoomDisp = document.getElementById('zoomDisp');

    let dataH1 = [], dataSMA = [], dataPriceSMA = [], dataPivot = [], dataShiftedTrend = [];
    let mouseX = -1;
    const pad = { top: 20, right: 65, bottom: 30, left: 10, gap: 25 };

    function writeLog(m) { logEl.innerText = "> " + m; }

    function parseCSVDate(s) {
        if (!s) return null;
        try {
            const clean = s.trim().replace(/-/g, '/');
            const parts = clean.split(' ');
            const d = parts[0].split('/');
            let h = 0, m = 0;
            if (parts.length > 1) { const t = parts[1].split(':'); h = parseInt(t[0]); m = parseInt(t[1] || 0); }
            const dt = new Date(parseInt(d[0]), parseInt(d[1]) - 1, parseInt(d[2]), h, m, 0);
            return isNaN(dt.getTime()) ? null : Math.floor(dt.getTime() / 1000);
        } catch(e) { return null; }
    }

    function parseCSV(text) {
        const lines = text.split(/\r?\n/).filter(l => l.includes(','));
        const res = [];
        for (let i = 1; i < lines.length; i++) {
            const c = lines[i].split(',');
            if (c.length < 3) continue;
            const t = parseCSVDate(c[0]);
            if (t === null) continue;
            res.push({ t, v: parseFloat(c[2]), p: c[3] ? parseFloat(c[3]) : NaN });
        }
        return res.sort((a, b) => a.t - b.t);
    }

    function parsePivotCSV(text) {
        const lines = text.split(/\r?\n/).filter(l => l.includes(','));
        const res = [];
        for (let i = 1; i < lines.length; i++) {
            const c = lines[i].split(',');
            if (c.length < 13) continue;
            const t = parseCSVDate(c[1]);
            if (t === null) continue;
            res.push({ t, levels: { PP: parseFloat(c[7]), R1: parseFloat(c[6]), S1: parseFloat(c[8]) } });
        }
        return res;
    }

    function draw() {
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
        ctx.scale(dpr, dpr);
        const w = rect.width, h = rect.height;
        ctx.fillStyle = "#131722"; ctx.fillRect(0, 0, w, h);

        if (dataH1.length === 0) return;

        const viewRange = parseInt(zoomSld.value);
        zoomDisp.innerText = viewRange + "本";
        const startIdx = Math.max(0, Math.floor((dataH1.length - viewRange) * (parseInt(scrollSld.value) / 100)));
        const endIdx = Math.min(dataH1.length - 1, startIdx + viewRange);

        const getX = (idx) => pad.left + (idx - startIdx) / (endIdx - startIdx) * (w - pad.left - pad.right);
        const splitY = h * 0.45, pTop = pad.top, pBot = splitY, rTop = splitY + pad.gap, rBot = h - pad.bottom;

        let visible = dataH1.slice(startIdx, endIdx + 1);
        let vList = visible.filter(d => !isNaN(d.v)).map(d => d.v);
        const vLo = Math.min(...vList) - 1, vHi = Math.max(...vList) + 1, vR = vHi - vLo || 1;
        let pList = visible.filter(d => !isNaN(d.p)).map(d => d.p);
        const pLo = pList.length > 0 ? Math.min(...pList) * 0.999 : 0;
        const pHi = pList.length > 0 ? Math.max(...pList) * 1.001 : 1;
        const pR = pHi - pLo || 0.001;

        const getYRatio = (v) => rBot - ((v - vLo) / vR) * (rBot - rTop);
        const getYPrice = (p) => pBot - ((p - pLo) / pR) * (pBot - pTop);

        // --- Pivot描画 ---
        if (dataPivot.length > 0) {
            ctx.setLineDash([4, 2]);
            for (let i = startIdx; i <= endIdx; i++) {
                const h1Date = new Date(dataH1[i].t * 1000).setHours(0,0,0,0) / 1000;
                const pvt = dataPivot.find(p => new Date(p.t * 1000).setHours(0,0,0,0) / 1000 === h1Date);
                if (pvt) {
                    const x = getX(i);
                    const bw = (w - pad.left - pad.right) / (endIdx - startIdx);
                    ctx.fillStyle = "rgba(144, 164, 174, 0.4)"; ctx.fillRect(x, getYPrice(pvt.levels.PP), bw + 1, 1);
                    ctx.fillStyle = "rgba(255, 82, 82, 0.4)"; ctx.fillRect(x, getYPrice(pvt.levels.R1), bw + 1, 1);
                    ctx.fillStyle = "rgba(0, 230, 118, 0.4)"; ctx.fillRect(x, getYPrice(pvt.levels.S1), bw + 1, 1);
                }
            }
            ctx.setLineDash([]);
        }

        const drawPath = (dataArr, field, color, weight, yFunc, isTrend = false) => {
            ctx.strokeStyle = color; ctx.lineWidth = weight; ctx.beginPath();
            let first = true;
            for (let i = startIdx; i <= endIdx; i++) {
                const item = isTrend ? dataArr.find(d => d.t === dataH1[i].t) : dataArr[i];
                if (!item || isNaN(item[field]) || item[field] === null) continue;
                const x = getX(i), y = yFunc(item[field]);
                if (first) { ctx.moveTo(x, y); first = false; } else { ctx.lineTo(x, y); }
            }
            ctx.stroke();
        };

        drawPath(dataH1, 'v', "#ff9800", 1, getYRatio);
        drawPath(dataShiftedTrend, 'v', "#2962ff", 3, getYRatio, true);
        drawPath(dataH1, 'p', "rgba(255,255,255,0.2)", 1, getYPrice);

        // ツールチップ
        if (mouseX > pad.left && mouseX < w - pad.right) {
            const hoverIdx = Math.round(startIdx + ((mouseX - pad.left) / (w - pad.left - pad.right)) * (endIdx - startIdx));
            const d = dataH1[hoverIdx];
            if (d) {
                const x = getX(hoverIdx);
                ctx.strokeStyle = "rgba(255,255,255,0.3)"; ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
                tooltip.style.display = "block"; tooltip.style.left = (x > w - 180 ? x - 170 : x + 10) + "px"; tooltip.style.top = "100px";
                tooltip.innerHTML = `<div style="color:#fff">${new Date(d.t*1000).toLocaleString()}</div>比率: ${d.v.toFixed(1)}%<br>価格: ${d.p ? d.p.toFixed(5) : '--'}`;
            }
        }
    }

    function initIn(id, type) {
        document.getElementById(id).addEventListener('change', e => {
            const f = e.target.files[0]; if(!f) return;
            const r = new FileReader();
            r.onload = ev => {
                if(type === 'h1') {
                    dataH1 = parseCSV(ev.target.result);
                    const last = dataH1[dataH1.length-1];
                    const next0 = new Date(last.t*1000); next0.setHours(24,0,0,0);
                    dataH1.push({ t: Math.floor(next0.getTime()/1000), v: null, p: null });
                    
                    dataShiftedTrend = [];
                    const i23 = []; dataH1.forEach((d,idx) => { if(new Date(d.t*1000).getHours() === 23) i23.push(idx); });
                    for(let i=0; i<i23.length; i++) {
                        if(i>0) dataShiftedTrend.push({ t: dataH1[i23[i]].t, v: dataH1[i23[i-1]].v });
                    }
                    if(i23.length > 0) dataShiftedTrend.push({ t: dataH1[dataH1.length-1].t, v: dataH1[i23[i23.length-1]].v });
                } else {
                    dataPivot = parsePivotCSV(ev.target.result);
                }
                writeLog(f.name + " 完了"); draw();
            };
            r.readAsText(f);
        });
    }

    initIn('h1In', 'h1'); initIn('pivotIn', 'pivot');
    zoomSld.oninput = draw; scrollSld.oninput = draw;
    const handleMove = e => {
        const r = canvas.getBoundingClientRect();
        const cx = (e.clientX || (e.touches && e.touches[0] ? e.touches[0].clientX : -1));
        if(cx !== -1) { mouseX = cx - r.left; draw(); }
    };
    container.addEventListener('mousemove', handleMove); container.addEventListener('touchstart', handleMove);
    window.onresize = draw;
</script>
</body>
</html>
