<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FX Dashboard v1.2.0 - Fixed Layout</title>
    <style>
        :root { --bg: #131722; --panel: #1e222d; --text: #d1d4dc; --blue: #2962ff; --cyan: #00bcd4; --orange: #ff9800; --green: #4caf50; --red: #f44336; --yellow: #ffeb3b; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { padding: 10px; background: var(--panel); border-bottom: 1px solid #363c4e; flex-shrink: 0; display: flex; flex-direction: column; gap: 10px; }
        .row { display: flex; gap: 15px; align-items: center; justify-content: space-between; }
        .file-label { background: var(--blue); color: white; padding: 6px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; font-weight: bold; }
        input[type="file"] { display: none; }
        #pivot-input { width: 100%; height: 40px; background: #2a2e39; border: 1px solid #363c4e; color: #fff; font-size: 11px; border-radius: 4px; padding: 5px; resize: none; }
        #dashboard { flex-grow: 1; overflow-y: auto; padding: 10px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .chart-card { background: var(--panel); border-radius: 8px; border: 1px solid #333; height: 380px; display: flex; flex-direction: column; }
        .chart-header { padding: 6px 10px; background: rgba(255,255,255,0.05); font-size: 11px; display: flex; justify-content: space-between; border-bottom: 1px solid #333; }
        .canvas-wrapper { flex-grow: 1; position: relative; cursor: crosshair; touch-action: none; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .controls { padding: 5px 10px; background: var(--panel); font-size: 10px; }
        .sld-group { display: flex; align-items: center; gap: 8px; }
        input[type="range"] { flex-grow: 1; height: 25px; accent-color: var(--blue); }
        .legend { display: flex; gap: 10px; font-size: 10px; margin-top: 5px; opacity: 0.8; }
    </style>
</head>
<body>

<header>
    <div class="row">
        <label class="file-label">📂 CSV読み込み (H1/Daily)
            <input type="file" id="fileIn" multiple accept=".csv, text/csv">
        </label>
        <div id="status" style="font-size:11px; color:var(--cyan)">ファイルを読み込んでください</div>
        <div style="font-size:10px; color:#5d606b">v1.2.0</div>
    </div>
    <textarea id="pivot-input" placeholder="あい証券のピボット表をここに貼り付けてください..."></textarea>
</header>

<div id="dashboard"></div>

<script>
    const dashboard = document.getElementById('dashboard');
    const statusEl = document.getElementById('status');
    const pivotInput = document.getElementById('pivot-input');
    const chartMap = new Map();
    
    // 固定設定
    const CONFIG = {
        "USDJPY": { threshold: 2.5, label: "防衛線" },
        "GBPUSD": { threshold: 2.0, label: "100Pips境界" },
        "EURUSD": { threshold: 1.5, label: "パニック捉え" },
        "GOLD":    { threshold: 5.0, label: "沸点見極め" }
    };

    function parseDate(s) {
        if (!s) return null;
        const clean = s.trim().replace(/\./g, '/').replace(/-/g, '/');
        const dt = new Date(clean);
        return isNaN(dt.getTime()) ? null : Math.floor(dt.getTime() / 1000);
    }

    // あい証券等のテキストからピボットを解析
    function parseTextPivot(text) {
        const lines = text.split('\n');
        const results = {};
        lines.forEach(line => {
            const parts = line.split(/\s+/);
            // EUR/USD 形式を EURUSD に変換
            const pairRaw = parts[0]?.replace('/', '');
            if (CONFIG[pairRaw] && parts.length >= 5) {
                const pvtIdx = parts.findIndex(p => p.includes('.')) + 3; // Pivot Pointの列を推測
                results[pairRaw] = {
                    P: parseFloat(parts[pvtIdx]),
                    R1: parseFloat(parts[pvtIdx-1]), R2: parseFloat(parts[pvtIdx-2]),
                    S1: parseFloat(parts[pvtIdx+1]), S2: parseFloat(parts[pvtIdx+2])
                };
            }
        });
        return results;
    }

    class FXChart {
        constructor(pair) {
            this.pair = pair;
            this.dataH1 = []; this.dataSMA = []; this.dataPriceSMA = [];
            this.dataPvt = []; this.dataShiftedTrend = [];
            this.zoom = 120; this.scroll = 100; this.mouseX = -1;
            this.initDOM();
        }

        initDOM() {
            const card = document.createElement('div');
            card.className = 'chart-card';
            card.innerHTML = `
                <div class="chart-header">
                    <span style="color:var(--cyan);font-weight:bold">${this.pair} <small style="color:#aaa;font-weight:normal">±${CONFIG[this.pair].threshold}%</small></span>
                    <span class="info-display" style="font-family:monospace; font-size:10px;">-</span>
                </div>
                <div class="canvas-wrapper"><canvas></canvas></div>
                <div class="controls">
                    <div class="sld-group"><input type="range" class="zoom-sld" min="24" max="500" value="120"></div>
                    <div class="legend">
                        <span style="color:var(--blue)">●比率</span> <span style="color:var(--yellow)">--10SMA</span> 
                        <span style="color:var(--red)">━基準</span> <span style="color:var(--red)">---閾値</span>
                    </div>
                </div>
            `;
            dashboard.appendChild(card);
            this.canvas = card.querySelector('canvas');
            this.ctx = this.canvas.getContext('2d');
            this.info = card.querySelector('.info-display');
            card.querySelector('.zoom-sld').oninput = (e) => { this.zoom = parseInt(e.target.value); this.draw(); };
            
            const handleMove = (e) => {
                const rect = this.canvas.getBoundingClientRect();
                const cx = (e.clientX || (e.touches && e.touches[0]?.clientX)) - rect.left;
                this.mouseX = cx; this.draw();
            };
            this.canvas.onmousemove = handleMove;
            this.canvas.ontouchmove = handleMove;
        }

        update(h1, pvt) {
            if(h1) {
                this.dataH1 = h1;
                const sma = (d, n, f) => d.map((_, i) => {
                    if (i < n - 1) return { t: d[i].t, v: NaN };
                    let sum = 0; for (let j = 0; j < n; j++) sum += d[i-j][f];
                    return { t: d[i].t, v: sum / n };
                });
                this.dataSMA = sma(this.dataH1, 10, 'v');
                this.dataPriceSMA = sma(this.dataH1, 10, 'p');
                
                // 23:00基準線の水平化ロジック
                this.dataShiftedTrend = [];
                let currentBase = NaN;
                this.dataH1.forEach(d => {
                    const hour = new Date(d.t * 1000).getHours();
                    if (hour === 23) currentBase = d.v;
                    this.dataShiftedTrend.push({ t: d.t, v: currentBase });
                });
            }
            if(pvt) this.dataPvt = Array.isArray(pvt) ? pvt : [pvt];
            this.draw();
        }

        draw() {
            const ctx = this.ctx;
            const w = this.canvas.clientWidth, h = this.canvas.clientHeight;
            const dpr = window.devicePixelRatio || 1;
            this.canvas.width = w * dpr; this.canvas.height = h * dpr;
            ctx.scale(dpr, dpr);
            ctx.fillStyle = "#131722"; ctx.fillRect(0, 0, w, h);
            if (this.dataH1.length === 0) return;

            const viewCount = Math.min(this.zoom, this.dataH1.length);
            const startIdx = Math.max(0, this.dataH1.length - viewCount);
            const getX = (i) => 10 + (i - startIdx) / viewCount * (w - 75);
            const splitY = h * 0.5;
            
            const visible = this.dataH1.slice(startIdx);
            const pL = visible.map(d => d.p).filter(p => !isNaN(p));
            const pLo = Math.min(...pL), pHi = Math.max(...pL), pR = (pHi - pLo || 0.01) * 1.3;
            const getYp = (p) => (splitY - 20) - ((p - (pLo - pR*0.1)) / pR) * (splitY - 40);

            const vL = visible.map(d => d.v).filter(v => !isNaN(v));
            const vLo = Math.min(...vL) - 2, vHi = Math.max(...vL) + 2, vR = vHi - vLo || 1;
            const getYr = (v) => (h - 20) - ((v - vLo) / vR) * (h - splitY - 30);

            // 描画ヘルパー
            const drawPath = (data, field, color, width, yFunc, dash = []) => {
                ctx.strokeStyle = color; ctx.lineWidth = width; ctx.setLineDash(dash);
                ctx.beginPath(); let first = true;
                for(let i = startIdx; i < this.dataH1.length; i++){
                    const val = (field === 'v' && data === this.dataShiftedTrend) ? data[i]?.v : data[i]?.[field];
                    if(isNaN(val)) continue;
                    const x = getX(i), y = yFunc(val);
                    if(first) { ctx.moveTo(x,y); first=false; } else ctx.lineTo(x,y);
                }
                ctx.stroke(); ctx.setLineDash([]);
            };

            // 下段：比率系
            drawPath(this.dataH1, 'v', varColor('--blue'), 2, getYr); // 買い比率
            drawPath(this.dataSMA, 'v', varColor('--yellow'), 1.5, getYr, [4, 2]); // 10SMA
            drawPath(this.dataShiftedTrend, 'v', varColor('--red'), 2, getYr); // 基準線(水平)

            // 閾値(破線)の描写
            const th = CONFIG[this.pair].threshold;
            for(let i = startIdx; i < this.dataH1.length; i++) {
                const base = this.dataShiftedTrend[i]?.v;
                if(!isNaN(base)) {
                    ctx.strokeStyle = varColor('--red'); ctx.lineWidth = 1; ctx.setLineDash([3, 3]);
                    const x = getX(i);
                    if (i === startIdx) ctx.beginPath();
                    ctx.lineTo(x, getYr(base + th));
                }
            }
            ctx.stroke();
            for(let i = startIdx; i < this.dataH1.length; i++) {
                const base = this.dataShiftedTrend[i]?.v;
                if(!isNaN(base)) {
                    const x = getX(i);
                    if (i === startIdx) ctx.beginPath();
                    ctx.lineTo(x, getYr(base - th));
                }
            }
            ctx.stroke(); ctx.setLineDash([]);

            // 上段：価格
            drawPath(this.dataH1, 'p', "#fff", 1, getYp);

            // マウスオーバー情報
            if(this.mouseX > 0) {
                const hIdx = Math.round(startIdx + (this.mouseX - 10) / (w - 75) * viewCount);
                const d = this.dataH1[hIdx], s = this.dataSMA[hIdx], t = this.dataShiftedTrend[hIdx];
                if(d) {
                    ctx.strokeStyle = "rgba(255,255,255,0.2)";
                    ctx.beginPath(); ctx.moveTo(getX(hIdx), 0); ctx.lineTo(getX(hIdx), h); ctx.stroke();
                    this.info.innerHTML = `P:${d.p.toFixed(3)} <span style="color:var(--blue)">B:${d.v.toFixed(1)}</span> <span style="color:var(--yellow)">S:${s?.v?.toFixed(1)}</span> <span style="color:var(--red)">T:${t?.v?.toFixed(1)}</span>`;
                }
            }
        }
    }

    function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

    // 初期化：4つのチャートを作成
    Object.keys(CONFIG).forEach(pair => {
        chartMap.set(pair, new FXChart(pair));
    });

    // ファイル読み込み
    document.getElementById('fileIn').onchange = async (e) => {
        const files = Array.from(e.target.files);
        statusEl.innerText = "読込中...";
        for (const file of files) {
            const text = await file.text();
            const fName = file.name.toUpperCase();
            const pair = Object.keys(CONFIG).find(k => fName.includes(k));
            if (pair) {
                const chart = chartMap.get(pair);
                if (fName.includes('DAILY')) { /* Daily処理が必要ならここ */ }
                else chart.update(parseH1CSV(text), null);
            }
        }
        statusEl.innerText = "完了";
    };

    // ピボット入力監視
    pivotInput.oninput = (e) => {
        const pvtData = parseTextPivot(e.target.value);
        for(const [pair, data] of Object.entries(pvtData)) {
            if(chartMap.has(pair)) chartMap.get(pair).update(null, data);
        }
    };

    function parseH1CSV(text) {
        return text.split(/\r?\n/).filter(l => l.includes(',')).map(line => {
            const c = line.split(',');
            return { t: parseDate(c[0]), v: parseFloat(c[2]), p: c[3] ? parseFloat(c[3]) : NaN };
        }).filter(d => d.t !== null).sort((a, b) => a.t - b.t);
    }
</script>
</body>
</html>
