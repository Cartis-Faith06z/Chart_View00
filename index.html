<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FX High-Function Dashboard</title>
    <style>
        :root { --bg: #131722; --panel: #1e222d; --text: #d1d4dc; --blue: #2962ff; --cyan: #00bcd4; --orange: #ff9800; --green: #4caf50; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { padding: 10px; background: var(--panel); border-bottom: 1px solid #363c4e; flex-shrink: 0; }
        .upload-row { display: flex; gap: 10px; align-items: center; }
        .file-label { background: var(--blue); color: white; padding: 8px 15px; border-radius: 4px; font-size: 13px; cursor: pointer; font-weight: bold; }
        input[type="file"] { display: none; }
        #status { font-size: 11px; color: var(--cyan); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #dashboard { flex-grow: 1; overflow-y: auto; padding: 10px; display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 15px; }
        .chart-card { background: var(--panel); border-radius: 8px; border: 1px solid #333; height: 400px; display: flex; flex-direction: column; position: relative; }
        .chart-header { padding: 8px 12px; background: rgba(255,255,255,0.05); font-size: 13px; display: flex; justify-content: space-between; border-bottom: 1px solid #333; }
        .info-display { color: #fff; font-family: monospace; font-size: 11px; }
        .canvas-wrapper { flex-grow: 1; position: relative; cursor: crosshair; touch-action: none; }
        canvas { width: 100%; height: 100%; }
        .controls { padding: 8px; border-top: 1px solid #333; }
        .sld-group { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
        input[type="range"] { flex-grow: 1; accent-color: var(--blue); }
    </style>
</head>
<body>

<header>
    <div class="upload-row">
        <label class="file-label">📂 CSVを選択
            <input type="file" id="fileIn" multiple accept=".csv, text/csv">
        </label>
        <span id="status">ファイルを読み込んでください</span>
    </div>
</header>

<div id="dashboard"></div>

<script>
    const dashboard = document.getElementById('dashboard');
    const statusEl = document.getElementById('status');
    const chartMap = new Map(); 
    const pairKeywords = ["USDJPY", "EURJPY", "GBPJPY", "EURUSD", "GBPUSD", "AUDUSD", "GOLD"];

    // --- ユーティリティ ---
    function formatDt(t) {
        const d = new Date(t * 1000);
        return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:00`;
    }

    function parseCSV(text) {
        const lines = text.split(/\r?\n/).filter(l => l.includes(','));
        const res = [];
        for (let i = 1; i < lines.length; i++) {
            const c = lines[i].split(',');
            if (c.length < 3) continue;
            const clean = c[0].trim().replace(/-/g, '/');
            const dt = new Date(clean);
            if (isNaN(dt)) continue;
            res.push({ t: Math.floor(dt.getTime()/1000), v: parseFloat(c[2]), p: c[3] ? parseFloat(c[3]) : NaN });
        }
        return res.sort((a, b) => a.t - b.t);
    }

    // 価格データからPivotを自動計算
    function calcAutoPivot(data) {
        const pivots = [];
        const days = {};
        data.forEach(d => {
            const dateStr = new Date(d.t * 1000).toLocaleDateString();
            if(!days[dateStr]) days[dateStr] = [];
            days[dateStr].push(d);
        });
        const dates = Object.keys(days).sort();
        for(let i=1; i<dates.length; i++) {
            const prevDay = days[dates[i-1]];
            const prices = prevDay.map(d => d.p).filter(p => !isNaN(p));
            if(prices.length === 0) continue;
            const high = Math.max(...prices), low = Math.min(...prices), close = prices[prices.length-1];
            const pp = (high + low + close) / 3;
            const nextDayFirstT = days[dates[i]][0].t;
            pivots.push({ t: nextDayFirstT, pp });
        }
        return pivots;
    }

    class FXChart {
        constructor(pair) {
            this.pair = pair;
            this.dataH1 = []; this.dataSMA = []; this.dataPriceSMA = [];
            this.dataPvt = []; this.dataShifted = [];
            this.zoom = 120; this.scroll = 100; this.mouseX = -1;
            this.initDOM();
        }

        initDOM() {
            const card = document.createElement('div');
            card.className = 'chart-card';
            card.innerHTML = `
                <div class="chart-header">
                    <span style="color:var(--cyan);font-weight:bold">${this.pair}</span>
                    <span class="info-display">Touch to inspect</span>
                </div>
                <div class="canvas-wrapper"><canvas></canvas></div>
                <div class="controls">
                    <div class="sld-group"><input type="range" class="zoom-sld" min="24" max="500" value="120"></div>
                    <div class="sld-group"><input type="range" class="scroll-sld" min="0" max="100" value="100"></div>
                </div>
            `;
            dashboard.appendChild(card);
            this.canvas = card.querySelector('canvas');
            this.ctx = this.canvas.getContext('2d');
            this.info = card.querySelector('.info-display');
            
            const drawBound = () => this.draw();
            card.querySelector('.zoom-sld').oninput = (e) => { this.zoom = e.target.value; drawBound(); };
            card.querySelector('.scroll-sld').oninput = (e) => { this.scroll = e.target.value; drawBound(); };
            
            const handleMove = (e) => {
                const rect = this.canvas.getBoundingClientRect();
                const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
                this.mouseX = x; drawBound();
            };
            this.canvas.addEventListener('mousemove', handleMove);
            this.canvas.addEventListener('touchstart', handleMove);
            this.canvas.addEventListener('touchmove', handleMove);
            window.addEventListener('resize', drawBound);
        }

        draw() {
            const ctx = this.ctx;
            const rect = this.canvas.parentElement.getBoundingClientRect();
            this.canvas.width = rect.width * window.devicePixelRatio;
            this.canvas.height = rect.height * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
            const w = rect.width, h = rect.height;

            ctx.fillStyle = "#131722"; ctx.fillRect(0, 0, w, h);
            if (this.dataH1.length === 0) return;

            const pad = { top: 20, right: 60, bottom: 20, left: 10, gap: 20 };
            const total = this.dataH1.length;
            const view = parseInt(this.zoom);
            const start = Math.max(0, Math.floor((total - view) * (parseInt(this.scroll) / 100)));
            const end = Math.min(total - 1, start + view);

            const getX = (i) => pad.left + (i - start) / (end - start) * (w - pad.left - pad.right);
            const splitY = h * 0.55, pBot = splitY - 10, rTop = splitY + 10, rBot = h - pad.bottom;

            const visible = this.dataH1.slice(start, end + 1);
            const pL = visible.map(d => d.p).filter(p => !isNaN(p));
            const pLo = Math.min(...pL), pHi = Math.max(...pL), pR = (pHi - pLo || 0.01) * 1.2;
            const getYp = (p) => pBot - ((p - (pLo - pR*0.1)) / pR) * (pBot - pad.top);

            const vL = visible.map(d => d.v).filter(v => !isNaN(v));
            const vLo = Math.min(...vL) - 1, vHi = Math.max(...vL) + 1, vR = vHi - vLo || 1;
            const getYr = (v) => rBot - ((v - vLo) / vR) * (rBot - rTop);

            // グリッド
            ctx.strokeStyle = "#2b2b43"; ctx.lineWidth = 0.5;
            [pad.top, pBot, rTop, rBot].forEach(y => { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke(); });

            const drawL = (arr, f, col, lw, yf, dash=[]) => {
                ctx.strokeStyle = col; ctx.lineWidth = lw; ctx.setLineDash(dash);
                ctx.beginPath(); let first = true;
                for(let i=start; i<=end; i++){
                    const d = arr[i]; if(!d || isNaN(d[f])) continue;
                    const x = getX(i), y = yf(d[f]);
                    if(first){ ctx.moveTo(x,y); first=false; } else ctx.lineTo(x,y);
                }
                ctx.stroke(); ctx.setLineDash([]);
            };

            // 描画
            drawL(this.dataPriceSMA, 'v', "rgba(0,188,212,0.5)", 3, getYp);
            drawL(this.dataH1, 'p', "#fff", 1, getYp);
            drawL(this.dataH1, 'v', varName("--orange"), 1, getYr);
            drawL(this.dataSMA, 'v', varName("--green"), 1.5, getYr, [4,4]);
            
            // Shifted Trend (23:00 -> 翌々日0:00)
            drawL(this.dataShifted, 'v', "#2962ff", 2, getYr);

            // Auto Pivot
            this.dataPvt.forEach(p => {
                const idx = this.dataH1.findIndex(d => d.t >= p.t);
                if(idx >= start && idx <= end) {
                    const x = getX(idx), y = getYp(p.pp);
                    ctx.strokeStyle = "rgba(255,255,255,0.3)"; ctx.setLineDash([2,2]);
                    ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(w - pad.right, y); ctx.stroke();
                }
            });

            // インタラクティブ情報表示
            if(this.mouseX > 0) {
                const relX = (this.mouseX - pad.left) / (w - pad.left - pad.right);
                const currentIdx = start + Math.round(relX * (end - start));
                const d = this.dataH1[currentIdx];
                const s = this.dataSMA[currentIdx];
                if(d) {
                    ctx.strokeStyle = "rgba(255,255,255,0.2)";
                    ctx.beginPath(); ctx.moveTo(getX(currentIdx), 0); ctx.lineTo(getX(currentIdx), h); ctx.stroke();
                    this.info.innerText = `${formatDt(d.t)} P:${d.p.toFixed(3)} SMA:${s.v ? s.v.toFixed(1) : '-'}%`;
                }
            }
        }
    }

    function varName(n) { return getComputedStyle(document.documentElement).getPropertyValue(n).trim(); }

    document.getElementById('fileIn').onchange = async (e) => {
        for (const file of e.target.files) {
            const text = await file.text();
            const pair = pairKeywords.find(k => file.name.toUpperCase().includes(k));
            if (!pair) continue;
            let chart = chartMap.get(pair);
            if (!chart) { chart = new FXChart(pair); chartMap.set(pair, chart); }
            
            chart.dataH1 = parseCSV(text);
            chart.dataSMA = getSMA(chart.dataH1, 10, 'v');
            chart.dataPriceSMA = getSMA(chart.dataH1, 10, 'p');
            chart.dataPvt = calcAutoPivot(chart.dataH1);
            
            // Shifted Trend ロジック: 23:00比率を2日後の0:00に適用
            const shifted = [];
            chart.dataH1.forEach((d, i) => {
                const date = new Date(d.t * 1000);
                if(date.getHours() === 23) {
                    const targetT = d.t + (48 - 23) * 3600; // 翌々日の0:00
                    shifted.push({ t: targetT, v: d.v });
                }
            });
            // 描画用に全インデックスにマッピング
            chart.dataShifted = chart.dataH1.map(d => {
                const val = shifted.filter(s => s.t <= d.t).pop();
                return { t: d.t, v: val ? val.v : NaN };
            });

            chart.draw();
            statusEl.innerText = `${pair} 読み込み完了`;
        }
    };

    function getSMA(d, n, f) {
        return d.map((_, i) => {
            if (i < n - 1) return { v: NaN };
            let sum = 0; for (let j = 0; j < n; j++) sum += d[i - j][f];
            return { v: sum / n };
        });
    }
</script>
</body>
</html>
